<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title> </title>
<style>
:root{--stt-red:#D81E2C;--stt-red-dark:#A6121E;--stt-red-soft:#fdecee;--ink:#1f2937;--ink-soft:#6b7280;--line:#e5e7eb;--bg:#f3f4f6;--card:#fff;--ok:#16a34a;--bad:#dc2626;--warn:#f59e0b;--na:#9ca3af;--radius:14px;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 14px rgba(0,0,0,.04)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:'Segoe UI','Sarabun',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:15px}
.appbar{position:sticky;top:0;z-index:30;background:var(--stt-red);color:#fff;display:flex;align-items:center;gap:10px;padding:10px 14px;box-shadow:0 2px 8px rgba(0,0,0,.15);flex-wrap:wrap}
.appbar .logo{font-weight:800;letter-spacing:1px;font-size:18px;display:flex;align-items:center;gap:8px}
.appbar .logo .mark{background:#fff;color:var(--stt-red);border-radius:6px;padding:1px 7px;font-weight:900;transform:skewX(-8deg)}
.appbar .spacer{flex:1}.appbar .who{font-size:13px;opacity:.95;text-align:right;line-height:1.2}
.appbar button.ghost{background:rgba(255,255,255,.15);border:0;color:#fff;border-radius:8px;padding:7px 12px;font-size:13px}
.langbar{display:flex;gap:4px;flex-wrap:wrap}
.langbar button{border:0;border-radius:6px;padding:4px 8px;font-size:12px;font-weight:700;background:rgba(255,255,255,.2);color:#fff}
.langbar button.on{background:#fff;color:var(--stt-red)}
.langbar.dark button{background:#f1f1f3;color:#444}.langbar.dark button.on{background:var(--stt-red);color:#fff}
.wrap{max-width:1000px;margin:0 auto;padding:16px 14px 60px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
.btn{background:var(--stt-red);color:#fff;border:0;border-radius:10px;padding:12px 18px;font-weight:700;font-size:15px}
.btn:hover{background:var(--stt-red-dark)}
.btn.sec{background:#fff;color:var(--stt-red);border:1.5px solid var(--stt-red)}
.btn.grey{background:#eef0f3;color:var(--ink)}
.btn.block{width:100%}.btn.sm{padding:7px 12px;font-size:13px}
.row{display:flex;gap:10px;flex-wrap:wrap}
.field{margin-bottom:12px;flex:1;min-width:150px}
div.field{display:flex;flex-direction:column;justify-content:flex-end}
div.field>label{flex:0 0 auto}
.field label{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;background:#fff;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--stt-red)}
h1{font-size:22px;margin:0 0 4px}h2{font-size:18px;margin:0 0 12px}
.muted{color:var(--ink-soft);font-size:13px}
.pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:700}
.pill.ok{background:#dcfce7;color:#166534}.pill.bad{background:#fee2e2;color:#991b1b}.pill.warn{background:#fef3c7;color:#92400e}.pill.draft{background:#e5e7eb;color:#374151}.pill.na{background:#f1f5f9;color:#475569}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,var(--stt-red),var(--stt-red-dark))}
.login-card{background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.3);padding:30px;width:100%;max-width:380px}
.login-card .brand{text-align:center;margin-bottom:14px}
.login-card .brand .mark{font-size:30px;font-weight:900;color:var(--stt-red);letter-spacing:1px}
.login-card .brand .sub{color:var(--ink-soft);font-size:13px;margin-top:2px}
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
.tile{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;text-align:center;position:relative}
.tile.active{cursor:pointer}.tile.active:hover{border-color:var(--stt-red)}.tile.soon{opacity:.55}
.tile .ic{font-size:34px;margin-bottom:8px}.tile .nm{font-weight:700}.tile .tag{position:absolute;top:8px;right:8px}
.docnote{background:#eef2ff;border:1px solid #c7d2fe;border-radius:10px;padding:9px 12px;margin-bottom:12px;font-size:14px}
.docnote b{color:var(--stt-red-dark);font-size:17px}.docnote.pending{background:#f8fafc;border-color:var(--line);color:var(--ink-soft)}
.stepper{display:flex;flex-wrap:wrap;justify-content:center;gap:6px 4px;padding:6px 2px 10px;margin-bottom:4px}
.step{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;min-width:74px;text-align:center;opacity:.78;cursor:pointer;border-radius:10px;padding:4px 2px}
.step:hover,.step:active{background:var(--stt-red-soft)}
.step.active{opacity:1}.step.done{opacity:1}
.step.active{background:var(--stt-red-soft);box-shadow:inset 0 0 0 1.5px var(--stt-red)}
.step.active .lbl{color:var(--stt-red-dark);font-weight:700}
.step .circ{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;border:2px solid var(--line);background:#fff;color:var(--ink-soft);font-size:17px}
.step.active .circ{border-color:var(--stt-red);color:var(--stt-red);background:var(--stt-red-soft)}
.step.done .circ{border-color:var(--ok);background:var(--ok);color:#fff}
.step .lbl{font-size:11px;margin-top:5px;line-height:1.2}
.guide-box{background:var(--stt-red-soft);border-left:4px solid var(--stt-red);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:13.5px}
.guide-box b{color:var(--stt-red-dark)}
.tbl-scroll{overflow-x:auto}
table.data{border-collapse:collapse;width:100%;min-width:560px;font-size:13px}
table.data th,table.data td{border:1px solid var(--line);padding:6px 8px;text-align:center}
table.data th{background:#f8fafc;font-weight:700}
.rowlabel{background:#f8fafc;font-weight:600;text-align:left!important;white-space:nowrap}
.grp{font-weight:800;color:var(--stt-red-dark);margin:14px 0 4px;font-size:14px;border-bottom:1px solid var(--stt-red-soft);padding-bottom:4px}
.chk-item{display:flex;align-items:flex-start;gap:8px;padding:9px 6px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.chk-item .no{min-width:26px;height:26px;padding:0 5px;border-radius:13px;background:#eef0f3;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex:0 0 auto;margin-top:2px}
.chk-item .desc{flex:1;min-width:160px;font-size:13.5px}
.fixbox{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:8px}
.fixbox input{flex:1;min-width:110px;padding:7px 8px;border:1px solid var(--line);border-radius:6px}
.seg{display:inline-flex;border:1.5px solid var(--line);border-radius:8px;overflow:hidden;align-self:flex-start}
.seg button{border:0;background:#fff;padding:6px 10px;font-size:12px;font-weight:700;color:var(--ink-soft);border-left:1px solid var(--line)}
.seg button:first-child{border-left:0}
.seg button.on-ok{background:var(--ok);color:#fff}.seg button.on-bad{background:var(--bad);color:#fff}.seg button.on-na{background:var(--na);color:#fff}
.comp-card{border:1.5px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px}
.comp-card .hd{font-weight:800;color:var(--stt-red-dark);margin-bottom:10px;font-size:16px}
.plate-row{border:1px solid var(--line);border-radius:10px;padding:8px 10px;margin-bottom:8px;background:#fafafa}
.plate-hd{font-weight:700;color:var(--stt-red-dark);font-size:13px;margin-bottom:4px}
.wm-wrap{position:relative;display:inline-block;max-width:100%}
.wm-base{width:100%;display:block;border:1px solid var(--line);border-radius:8px}
.wm-logo{position:absolute;top:50%;left:50%;width:58%;transform:translate(-50%,-50%) rotate(-22deg);opacity:.16;pointer-events:none}
.model-grid{display:flex;flex-direction:column;align-items:center;gap:14px}
.model-cell{width:100%;max-width:340px;text-align:center}
.slot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-top:6px}
.slot{border:1.5px dashed var(--line);border-radius:10px;overflow:hidden;background:#fafafa;position:relative}
.slot .lab{font-size:11px;font-weight:700;color:var(--ink-soft);padding:5px 6px;background:#f3f4f6;text-align:center}
.slot .ph{aspect-ratio:1;display:flex;align-items:center;justify-content:center;cursor:pointer}
.slot .ph img{width:100%;height:100%;object-fit:cover}.slot .ph .add{color:var(--ink-soft);font-size:24px}
.slot .del{position:absolute;top:24px;right:4px;background:rgba(0,0,0,.6);color:#fff;border:0;border-radius:50%;width:22px;height:22px;font-size:13px;line-height:1}
.slot-acts{display:flex;gap:3px;padding:4px}.sa-btn{flex:1;border:1px solid var(--line);background:#fff;border-radius:6px;padding:5px 2px;font-size:11px;font-weight:700;color:var(--ink);cursor:pointer}
.sa-btn:hover{background:var(--stt-red-soft);border-color:var(--stt-red);color:var(--stt-red-dark)}
.up-note{font-size:11px;color:var(--ink-soft);margin-top:6px}
.camov{position:fixed;inset:0;background:#000;z-index:300;display:flex;flex-direction:column}
.camov video{flex:1;width:100%;min-height:0;object-fit:contain;background:#000}
.camov .camhint{position:absolute;top:46%;left:0;right:0;text-align:center;color:#fff;font-size:14px;padding:0 20px}
.camov .camctl{position:absolute;top:12px;left:0;right:0;display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap;padding:0 12px;z-index:2}
.camov .cambtn{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:20px;padding:7px 14px;font-size:13px;font-weight:700}
.camov .cambtn.on{background:#f59e0b;border-color:#f59e0b;color:#111}
.camov .camzoom{background:rgba(0,0,0,.45);color:#fff;border-radius:20px;padding:6px 12px;font-size:12px;display:flex;align-items:center;gap:6px}
.camov .camzoom input[type=range]{width:120px}
.camov .cambar{display:flex;gap:10px;justify-content:center;padding:16px;background:#111}
.rep-item{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;cursor:pointer;background:#fff}
.rep-item:hover{border-color:var(--stt-red);background:var(--stt-red-soft)}
.rep-item .docno{font-weight:800;color:var(--stt-red-dark)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:10px;z-index:100;box-shadow:var(--shadow);font-size:14px;opacity:0;transition:opacity .2s;max-width:90%;text-align:center}
.toast.show{opacity:1}
.banner{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:14px}
.banner.demo{background:#fff7ed;border:1px solid #fdba74;color:#9a3412}
.crumb{font-size:13px;color:var(--ink-soft);margin-bottom:10px;cursor:pointer}
.howto-step{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
.howto-step .hd{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#f8fafc;cursor:pointer}
.howto-step .hd .n{width:30px;height:30px;border-radius:8px;background:var(--stt-red);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;flex:0 0 auto}
.howto-step .bd{padding:0 14px;max-height:0;overflow:hidden;transition:max-height .25s,padding .25s}
.howto-step.open .bd{max-height:600px;padding:12px 14px}
.cond-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px}
.cond-grid label{display:flex;align-items:center;gap:6px;font-size:13px;padding:6px;border:1px solid var(--line);border-radius:8px;cursor:pointer}
.cond-grid input{width:auto}
.report{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
.rep-table{width:100%;border-collapse:collapse}.rep-table td{padding:0;vertical-align:top}
.rep-foot{display:flex;justify-content:space-between;gap:8px;border-top:1px solid var(--line);margin-top:14px;padding-top:8px;font-size:12px;color:var(--ink-soft)}
.rep-sec{margin-bottom:16px}.comp-blk{margin-bottom:12px}
.sign-block{margin-top:22px}
.sign-row{display:flex;gap:16px;margin-bottom:18px}
.sign-box{flex:1;min-width:0;text-align:center}
.sign-line{font-size:12px;color:#222;line-height:1.25;min-height:30px}
.sign-nm{border-top:1px dotted #555;margin-top:40px}
.sign-paren{font-size:12px;margin-top:5px;color:#333}
.sign-date{font-size:11px;color:#555;margin-top:3px}
.lh{display:flex;gap:12px;align-items:flex-start;border-bottom:3px solid var(--stt-red);padding-bottom:8px;margin-bottom:8px}
.lh-mark{flex:0 0 auto;text-align:center;line-height:1}
.lh-img{height:54px;width:auto;display:block}
.lh-mark .lh-mk{font-weight:900;color:var(--stt-red);font-size:20px;letter-spacing:1px;margin-top:-2px}
.lh-mark .lh-mksub{font-size:7px;color:#333;letter-spacing:.5px}
.lh-info{flex:1;min-width:0}
.lh-name{font-weight:900;font-size:18px;color:#111;letter-spacing:.5px;font-style:italic}
.lh-tag{font-weight:700;font-size:13px;color:#222}
.lh-hash{font-size:9.5px;color:#555;word-break:break-word}.lh-addr{font-size:9.5px;color:#444}
.page-head{display:flex;justify-content:space-between;align-items:flex-start;margin:6px 0 12px}
.page-head .t1{font-weight:800;color:var(--stt-red-dark);font-size:15px}
.rep-photos{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.rep-photos.sm{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
.rep-photos .c{border:1px solid var(--line);border-radius:8px;overflow:hidden}
.rep-photos .c.land{grid-column:1/-1}
.rep-photos .c .lab{font-size:11px;font-weight:700;text-align:center;background:#f3f4f6;padding:4px}
.rep-photos .c img{width:100%;display:block;aspect-ratio:1;object-fit:cover}
.rep-photos .c.land img{aspect-ratio:16/10}
.rev-cell{border:1px solid var(--line);border-radius:8px;overflow:hidden}
.rev-cell .lab{font-size:11px;font-weight:700;text-align:center;background:#f3f4f6;padding:4px}
.rev-cell img{width:100%;display:block;aspect-ratio:1;object-fit:cover}
.rev-cell .seg{display:flex;width:100%}
.rev-cell .seg button{flex:1}
@page{ size:A4; margin:0; }
@media print{
  .appbar,.no-print,.stepper,.crumb,.toast{display:none!important}
  body{background:#fff}.wrap{max-width:none;padding:0;margin:0}
  .card{box-shadow:none;border:1px solid #999;page-break-inside:avoid}
  .report{border:none;box-shadow:none;border-radius:0;padding:0;margin:0}
  /* หัว/ท้ายกระดาษซ้ำทุกหน้าด้วยกลไก table (ไม่มี URL เบราว์เซอร์ เพราะ margin:0) */
  .rep-table{width:100%;border-collapse:collapse}
  .rep-table > thead{display:table-header-group}
  .rep-table > tfoot{display:table-footer-group}
  .rep-table > thead > tr > td, .rep-table > tbody > tr > td{padding:0 9mm}
  .rep-table > tfoot > tr > td{padding:0 9mm 4mm}
  .rep-head{padding-top:5mm;background:#fff}
  .rep-foot{background:#fff;border-top:1px solid #ccc;margin-top:6mm;padding-top:3px}
  .lh{margin-bottom:4px;padding-bottom:5px}
  .lh-img{height:52px}.lh-name{font-size:16px}.page-head{margin:3px 0 0}
  h2{font-size:14px;margin:8px 0 5px;page-break-after:avoid}
  .grp{page-break-after:avoid}
  .keep,.sign-block,.rep-photos .c,table.data,.chk-item,.comp-blk>.keep{page-break-inside:avoid}
  .rep-photos,.rep-photos.sm{grid-template-columns:repeat(4,1fr);gap:6px}
  .rep-photos .c{border:1px solid #888;border-radius:5px}
  .rep-photos .c.land{grid-column:span 2}
  .rep-photos .c .lab{font-size:9.5px;font-weight:700;padding:3px;background:#f0f0f0;color:#000}
  .rep-photos .c img{aspect-ratio:1;height:auto;width:100%;object-fit:cover;background:#fff}
  .rep-photos .c.land img{aspect-ratio:16/10}
  table.data{font-size:11px}table.data th,table.data td{padding:3px 5px}
  .sign-row{gap:12px;margin-bottom:14px}.sign-nm{margin-top:30px}
  .model-grid{align-items:center;gap:7mm}
  .model-cell{max-width:120mm}.model-cell .wm-wrap{max-width:120mm}.model-cell .wm-base{max-height:62mm;width:auto;max-width:120mm}
}
</style>
</head>

  DB.employeeNames().then(names=>{const el=document.getElementById("emp-list");if(el)el.innerHTML=(names||[]).map(n=>`<option value="${esc(n)}">`).join("");}).catch(()=>toast("โหลดรายชื่อไม่ได้"));
  document.getElementById("lg-pin").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
}
async function doLogin(){
  const name=(document.getElementById("lg-name").value||"").trim();
  const pin=(document.getElementById("lg-pin").value||"").trim();
  if(!name||!pin) return toast(t('loginName'));
  toast("...");
  let u=null; try{u=await DB.login(name,pin);}catch(e){return toast("เชื่อมต่อฐานข้อมูลไม่ได้");}
  if(!u) return toast("ชื่อหรือรหัสไม่ถูกต้อง");
  USER=u; LS.set("session",u); go("home");
}
function HomeView(){
  const modules=[{ic:"💧",nm:t('modWater'),active:true},{ic:"🔍",nm:"ตรวจสภาพรถ"},{ic:"🎨",nm:"ตรวจงานสี"},{ic:"⚡",nm:"ตรวจงานไฟฟ้า"},{ic:"📦",nm:"ตรวจก่อนส่งมอบ"},{ic:"📊",nm:"รายงานสรุป"}];
  $("#page").innerHTML=`<h1>${t('homeH1')}</h1><p class="muted">${t('homeP')}</p><div class="tiles" style="margin-top:14px">${modules.map(m=>`<div class="tile ${m.active?'active':'soon'}" ${m.active?'onclick="openWater()"':''}>${m.active?`<span class="tag pill ok">${t('ready')}</span>`:`<span class="tag pill draft">${t('soon')}</span>`}<div class="ic">${m.ic}</div><div class="nm">${m.nm}</div></div>`).join("")}</div>`;
}
function openWater(){
  CURVIEW="water"; window.scrollTo(0,0);
  $("#page").innerHTML=`<div class="crumb" onclick="go('home')">${t('backHome')}</div><h1>💧 ${t('modWater')}</h1><div class="tiles" style="margin-top:14px"><div class="tile active" onclick="go('new')"><div class="ic">➕</div><div class="nm">${t('newRep')}</div></div><div class="tile active" onclick="go('search')"><div class="ic">🔍</div><div class="nm">${t('searchRep')}</div></div>${canReview()?`<div class="tile active" onclick="go('approve')"><span class="tag pill warn" id="apvbadge"></span><div class="ic">✅</div><div class="nm">รอ Approve (หัวหน้า)</div></div>`:''}${canReview()?`<div class="tile active" onclick="go('provertank')"><div class="ic">🛢️</div><div class="nm">Prover Tank (มาตรฐาน)</div></div>`:''}<div class="tile active" onclick="go('howto')"><div class="ic">📖</div><div class="nm">${t('howtoTile')}</div></div></div>`;
  loadProver();
  if(canReview()) DB.searchReports("").then(rows=>{ const n=(rows||[]).filter(r=>r.status!=='draft'&&r.review_status!=='accepted').length; const b=document.getElementById("apvbadge"); if(b&&n) b.textContent=n+" รอ"; }).catch(()=>{});
}

  return {n_plate:pl.length,plates:pl,h:c.h||"",void_l:c.void_l||"",seal_plate:c.seal_plate||"",seal_cap:c.seal_cap||"STT",ph_seal:c.ph_seal||"",ph_name:c.ph_name||""}; }
function buildSteps(){ STEPS=[{key:"job",ic:"📋"},{key:"precheck",ic:"✓"},{key:"table",ic:"💧"},{key:"seal",ic:"🔒"},{key:"chassis",ic:"🚛"},{key:"postcheck",ic:"☑️"},{key:"summary",ic:"🏁"}]; }

function refreshDocBanner(){ const el=document.getElementById("docbanner"); if(!el)return; const info=(DRAFT&&(DRAFT.job_no||DRAFT.customer))?` <span class="muted" style="font-weight:600">• Job ${esc(DRAFT.job_no||'-')} • ${esc(DRAFT.customer||'-')}</span>`:''; el.innerHTML = (DRAFT&&DRAFT.doc_no)?`<div class="docnote">📄 ${t('docNoLabel')}: <b>${esc(DRAFT.doc_no)}</b>${info}</div>`:`<div class="docnote pending">📄 ${t('docNoNone')}${info}</div>`; }

function chkRangeDone(s,e){ for(let i=s;i<e;i++){ const x=DRAFT.checklist[i]; if(!x||!x.st) return false; if(x.st==='fail'&&(!x.fdate||!x.fby)) return false; if(x.st==='na'&&!(x.note&&x.note.trim())) return false; } return true; }
function tableDone(){ const oil=isOil(); if(!DRAFT.comps||!DRAFT.comps.length) return false; for(const c of DRAFT.comps){ const pls=c.plates||[]; if(!pls.length) return false; for(const p of pls){ if(!String(p.vol||'').trim()) return false; if(oil){ if(!String(p.u||'').trim()||!String(p.bot||'').trim()) return false; } else { if(!String(p.seal_no||'').trim()||!String(p.level_bottom||'').trim()) return false; } } if(oil){ if(!String(c.h||'').trim()||!String(c.seal_plate||'').trim()) return false; } } return true; }
function slotsDone(target,labels){ const st=DRAFT[target]||{}; for(let i=0;i<labels.length;i++){ if(!st[i]) return false; } return true; }
function stepDone(key){

  if(key==='seal') return isOil()? slotsDone('seal_slots',SEAL_SLOTS) : true;

  return false;

function openCamera(elem){

async function startCam(){
  try{
    if(CAM.stream) CAM.stream.getTracks().forEach(t=>t.stop());
    if(!window.isSecureContext) return showCamError('secure');
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia) return showCamError('nodev');
    CAM.stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:CAM.facing},width:{ideal:1920},height:{ideal:1080}},audio:false});
    const v=document.getElementById('camv'); if(v) v.srcObject=CAM.stream;
    const h=document.getElementById('camhint'); if(h) h.style.display='none';
    CAM.torch=false;
    try{ const tr=CAM.stream.getVideoTracks()[0]; if(tr&&tr.applyConstraints) tr.applyConstraints({advanced:[{focusMode:'continuous'}]}).catch(()=>{}); }catch(e){}
    setupCamControls();
  }catch(e){ showCamError((e&&e.name)||(e&&e.message)||'err'); }
}
function setupCamControls(){
  try{ const ctl=document.getElementById('camctl'); if(!ctl||!CAM.stream) return; const tr=CAM.stream.getVideoTracks()[0]; const caps=(tr&&tr.getCapabilities)?tr.getCapabilities():{}; let html='';
    if(caps && caps.torch) html+='<button class="cambtn" id="torchbtn" onclick="toggleTorch()">🔦 ไฟแฟลช</button>';
    if(caps && caps.zoom){ const z=caps.zoom; const cur=(tr.getSettings&&tr.getSettings().zoom)||z.min; html+='<span class="camzoom">🔍 ซูม <input type="range" min="'+z.min+'" max="'+z.max+'" step="'+(z.step||0.1)+'" value="'+cur+'" oninput="applyZoom(this.value)"></span>'; }
    ctl.innerHTML=html;
  }catch(e){}
}
function toggleTorch(){ try{ const tr=CAM.stream&&CAM.stream.getVideoTracks()[0]; if(!tr) return; CAM.torch=!CAM.torch; tr.applyConstraints({advanced:[{torch:CAM.torch}]}).catch(()=>toast('อุปกรณ์นี้ไม่รองรับแฟลช')); const b=document.getElementById('torchbtn'); if(b) b.classList.toggle('on',CAM.torch); }catch(e){} }
function applyZoom(v){ try{ const tr=CAM.stream&&CAM.stream.getVideoTracks()[0]; if(tr) tr.applyConstraints({advanced:[{zoom:Number(v)}]}).catch(()=>{}); }catch(e){} }
function showCamError(kind){
  if(CAM.stream){ CAM.stream.getTracks().forEach(t=>t.stop()); CAM.stream=null; }
  const ov=document.getElementById('camov'); if(!ov) return;

async function captureCam(){
  const v=document.getElementById('camv'); if(!v||!v.videoWidth){ return toast('กล้องยังไม่พร้อม รอสักครู่'); }
  // ย่อรูปก่อนอัป (max 1280px) เพื่อให้อัป/เซฟเร็วขึ้นมาก
  const MAX=1600; let w=v.videoWidth, h=v.videoHeight; const sc=Math.min(1, MAX/Math.max(w,h)); w=Math.round(w*sc); h=Math.round(h*sc);
  const cv=document.createElement('canvas'); cv.width=w; cv.height=h; const ctx=cv.getContext('2d'); ctx.imageSmoothingQuality='high'; ctx.drawImage(v,0,0,w,h);
  // ปิดกล้องทันที + อัปเบื้องหลัง ให้รู้สึกเร็ว
  const ds=CAM.ds, label=CAM.label; closeCamera(); toast(t('uploading'));
  const blob=await new Promise(res=>cv.toBlob(res,'image/jpeg',0.85));
  let url; try{ url=await uploadImage(blob,label,true); }catch(err){ return toast('อัปโหลดไม่สำเร็จ: '+(err.message||err)); }

function validateAll(){

  return true;
}

  // ===== Chassis (รูป 45° แนวนอน) =====
  const chPh=CHASSIS_SLOTS.map((lab,idx)=>{ const u=d.chassis_slots&&d.chassis_slots[idx]; if(!u) return ''; const land=thaiOnly(lab).indexOf('45')>=0; return cell(thaiOnly(lab),u,land); }).join("");
  if(chPh) body+=`<div class="rep-sec"><h2>Chassis / Name Plate</h2><div class="rep-photos sm">${chPh}</div></div>`;
  // ===== Checklist =====
  const cl=d.checklist||[];
  let chkHtml='<div class="rep-sec"><h2>ผลการตรวจสอบ (FM-SAL-0102)</h2>';
  cl.forEach((it,i)=>{ if(i===0) chkHtml+=`<div class="grp">ก่อนวัดน้ำ (ข้อ 1-8)</div>`; if(i===CHK_PRE) chkHtml+=`<div class="grp">หลังวัดน้ำ (ข้อ 9-12)</div>`; const st=(it&&it.st)?it.st:''; const fix=(st==='fail')?`<div class="muted">แก้ไข: ${esc(it.fd||'-')} • วันที่ ${esc(it.fdate||'-')} • โดย ${esc(it.fby||'-')}</div>`:((st==='na'&&it.note)?`<div class="muted">หมายเหตุ: ${esc(it.note)}</div>`:''); chkHtml+=`<div class="chk-item"><div class="no">${(CHK_FM[i]&&CHK_FM[i].no)||(i+1)}</div><div class="desc">${esc((CHK_FM[i]&&CHK_FM[i].txt)||'')}${fix}</div>${triple(st)}</div>`; });
  if(d.remark) chkHtml+=`<div class="guide-box" style="margin-top:10px"><b>หมายเหตุ:</b> ${esc(d.remark)}</div>`;
  chkHtml+=`</div>`;
  // ===== ช่องเซ็น (มาตรฐาน อยู่ด้วยกัน) =====
  const blankDate='วันที่ ......./......./.......';
  const sbox=(role,nm,dateText,hint)=>`<div class="sign-box"><div class="sign-line">${role}</div>${hint?`<div style="font-size:10px;color:#888;font-style:italic;margin-top:1px">${hint}</div>`:''}<div class="sign-nm"></div><div class="sign-paren">${nm?('( '+nm+' )'):'(.......................................................................)'}</div><div class="sign-date">${dateText}</div></div>`;
  const ldate = d.review_date? new Date(d.review_date).toLocaleDateString('th-TH') : '';
  chkHtml+=`<div class="sign-block keep"><div class="sign-row">${sbox('ผู้วัดน้ำ/ผู้ตรวจสอบ 1 (QC Inspector)',insp1,'วันที่ '+cdate)}${sbox('ผู้วัดน้ำ/ผู้ตรวจสอบ 2 (QC Inspector)',insp2,insp2?('วันที่ '+cdate):blankDate)}${sbox('หัวหน้าตรวจสอบ Report และกระบวนการ (QC Lead)',esc(d.reviewer||''),ldate?('วันที่ '+ldate):blankDate)}</div><div class="sign-row">${sbox('ผู้ร่วมตรวจสอบ (Witnessed by)','',blankDate,'ลงลายมือชื่อ')}${sbox('ผู้อนุมัติขั้นสุดท้าย / ผู้รับรอง (Approved by)','',blankDate,'เซ็นสด + เขียนชื่อตัวบรรจง')}</div></div>`;
  // ===== ภายใน (ไม่พิมพ์): ประวัติ/Tracking =====
  if(d.reviewer || (d.history&&d.history.length)){
    chkHtml+=`<div class="no-print" style="margin-top:14px"><h2>การเคลื่อนไหวเอกสาร (Tracking) — เฉพาะภายใน</h2>`;
    if(d.reviewer) chkHtml+=`<div><b>Approve โดย:</b> ${esc(d.reviewer)} • วันที่ ${esc(d.review_date? new Date(d.review_date).toLocaleString('th-TH'):'-')} • ผล: ${reviewPill(d.review_status)}</div>`;
    if(d.history&&d.history.length){ chkHtml+=`<div style="margin-top:6px"><b>ประวัติการเคลื่อนไหว (${d.history.length} ครั้ง):</b>`+d.history.map((x,i)=>`<div class="muted">${i+1}. [${esc(x.type)}] โดย ${esc(x.by)} — ${esc(x.date? new Date(x.date).toLocaleString('th-TH'):'')}${x.detail?(' — '+esc(x.detail)):''}</div>`).join("")+`</div>`; }
    chkHtml+=`</div>`;
  }
  body+=chkHtml;
  const head=`<div class="rep-head">${LETTERHEAD}<div class="page-head"><div class="t1">REPORT การวัดน้ำ / Water Gauging Report</div><div style="text-align:right"><div class="docno" style="font-size:17px;color:var(--stt-red-dark);font-weight:800">${esc(r.doc_no)}</div>${docStatusPill(r)}</div></div></div>`;
  const foot=`<div class="rep-foot"><div>ผู้จัดทำ/ผู้วัดน้ำ: <b>${maker}</b></div><div>วันที่จัดทำ: ${cdate}</div></div>`;
  return `<div class="report"><table class="rep-table"><thead><tr><td>${head}</td></tr></thead><tfoot><tr><td>${foot}</td></tr></tfoot><tbody><tr><td><div class="rep-content">${body}</div></td></tr></tbody></table></div>`;
}
async function DetailView(id){
  await loadProver();
  let r; try{r=await DB.getReport(id);}catch(e){$("#page").innerHTML='<p>โหลดไม่ได้</p>';return;}
  if(!r){$("#page").innerHTML='<p>ไม่พบรายงาน</p>';return;}
  const logs=await DB.printLogs(id).catch(()=>[]);
  const d=r.data||{};
  const approved=((d.review_status||r.review_status)==='accepted');
  let pagesHtml=""; try{ pagesHtml=buildReportPages(r); }catch(err){ pagesHtml='<div class="card" style="color:#b91c1c">⚠️ แสดงรายงานมีปัญหา (แจ้ง Candy): '+esc(err.message||err)+'</div>'; }
  let hasPhotos=false; try{ hasPhotos=allPhotos(d).length>0; }catch(e){}
  $("#page").innerHTML=`
    <div class="crumb no-print" onclick="go('search')">${t('back')}</div>
    ${r.status==='draft'?`<div class="banner demo no-print">ฉบับร่าง — <a href="javascript:void(0)" onclick="editReport('${esc(String(r.id))}')">กดเพื่อทำต่อ/แก้ไข</a></div>`:''}
    <div class="banner no-print" style="background:#f0f9ff;border:1px solid #bae6fd;color:#075985">สถานะเอกสาร: ${docStatusPill(r)} ${d.reviewer?('• Approve โดย '+esc(d.reviewer)):''}</div>
    <div id="printable">${pagesHtml}</div>
    <div class="card no-print">
      <div class="row" style="align-items:center">
        ${approved?`<button class="btn" onclick="doPrint('${esc(String(r.id))}')">${t('printBtn')}</button>`:`<span class="pill warn" style="align-self:center;padding:10px 14px">⏳ ปริ้นได้หลังหัวหน้า Approve</span>`}
        ${canReview()&&hasPhotos?`<button class="btn sec" onclick="go('review','${esc(String(r.id))}')">${t('reviewBtn')}</button>`:''}
        ${(d.review_status==='accepted'&&!canReview())?`<span class="pill ok" style="align-self:center">🔒 หัวหน้าตรวจรับแล้ว (ล็อก)</span>`:`<button class="btn grey" onclick="editReport('${esc(String(r.id))}')">${t('editBtn')}</button>`}
        ${(r.status==='needs_fix'||r.status==='fail')?`<button class="btn sec" onclick='reAlert(${JSON.stringify(r).replace(/'/g,"&#39;")})'>📣 แจ้งกลุ่ม Sale</button>`:''}
        <div style="flex:1"></div>
        <div class="muted">ปริ้นไปแล้ว <b>${r.print_count||0}</b> ครั้ง${r.last_printed_by?` • ล่าสุดโดย ${esc(r.last_printed_by)}`:''}</div>
      </div>
      ${(r.photo_folder||d.photo_folder)?`<p class="up-note">📁 รูปทั้งหมดของงานนี้: <a href="${esc(r.photo_folder||d.photo_folder)}" target="_blank">เปิดโฟลเดอร์ใน Google Drive</a></p>`:''}
      <p class="up-note">Admin/หัวหน้า กด "พิมพ์/บันทึก PDF" แล้วเลือก "บันทึกเป็น PDF" จะได้ไฟล์พร้อมหัวกระดาษและช่องเซ็น</p>
      ${logs.length?`<div style="margin-top:6px"><b>ประวัติการพิมพ์</b>${logs.map(l=>`<div class="muted">• ${esc(l.printed_by)} — ${new Date(l.printed_at).toLocaleString('th-TH')}</div>`).join("")}</div>`:''}
    </div>`;
}
async function doPrint(id){ await DB.logPrint(id,USER.name).catch(()=>{}); toast("บันทึกการพิมพ์โดย "+USER.name); setTimeout(()=>window.print(),350); }
function reAlert(r){ alertSale(r,[]); }
window.addEventListener('error',function(e){ try{ toast('ผิดพลาด: '+(e.message||'')); }catch(_){} });
window.addEventListener('unhandledrejection',function(e){ try{ toast('ผิดพลาด: '+((e.reason&&e.reason.message)||e.reason||'')); }catch(_){} });
/* ===== เปิดผ่านแอป LINE/อื่น → เด้งไปเบราว์เซอร์จริง (กล้องถึงจะใช้ได้) ===== */
function inAppBrowser(){ const ua=navigator.userAgent||''; return /Line\//i.test(ua)||/FBAN|FBAV|FB_IAB|Instagram|Messenger/i.test(ua); }
function openExternalBrowser(){ const url=location.href.split('#')[0]; const sep=url.indexOf('?')>=0?'&':'?'; const ua=navigator.userAgent||'';
  if(/Line\//i.test(ua)){ location.href=url+sep+'openExternalBrowser=1'; return; }
  if(/Android/i.test(ua)){ try{ const u=url.replace(/^https?:\/\//,''); location.href='intent://'+u+'#Intent;scheme=https;package=com.android.chrome;end'; return; }catch(e){} }
  location.href=url+sep+'openExternalBrowser=1';
}
function showInAppGate(){
  try{ if(LS.get('skip_inapp')) return; }catch(e){}
  const isLine=/Line\//i.test(navigator.userAgent||'');
  const ov=document.createElement('div'); ov.id='inappgate';
  ov.style.cssText='position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#D81E2C,#A6121E);display:flex;align-items:center;justify-content:center;padding:22px';
  ov.innerHTML='<div style="background:#fff;color:#1f2937;border-radius:18px;padding:24px;max-width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.35)"><div style="font-size:42px">🌐</div><h2 style="color:#D81E2C;margin:6px 0 8px">เปิดในเบราว์เซอร์ก่อนนะ</h2><p style="font-size:14px;line-height:1.6;color:#374151">ตอนนี้เปิดผ่านแอป '+(isLine?'LINE':'อื่น')+' ซึ่ง <b>กล้องอาจถ่ายรูปไม่ได้</b><br>เปิดในเบราว์เซอร์ (Chrome/Safari) เพื่อใช้งานเต็มที่</p><button onclick="openExternalBrowser()" style="width:100%;background:#D81E2C;color:#fff;border:0;border-radius:12px;padding:14px;font-size:16px;font-weight:800;margin-top:6px">เปิดในเบราว์เซอร์ →</button><div style="font-size:12.5px;color:#6b7280;margin-top:12px;text-align:left;line-height:1.8"><b>ถ้าปุ่มไม่ทำงาน เปิดเอง:</b><br>• <b>Android:</b> แตะ <b>⋮</b> มุมขวาบน → <b>เปิดในเบราว์เซอร์อื่น</b><br>• <b>iPhone:</b> แตะ <b>↗ / ⋯</b> → <b>เปิดใน Safari</b></div><a href="javascript:void(0)" onclick="document.getElementById(\'inappgate\').remove();try{LS.set(\'skip_inapp\',true)}catch(e){}" style="display:inline-block;margin-top:14px;font-size:12px;color:#9ca3af">ใช้ต่อทางนี้ (กล้องอาจใช้ไม่ได้)</a></div>';
  document.body.appendChild(ov);
}
if(inAppBrowser()) setTimeout(showInAppGate,60);
try{ render("home"); }catch(e){ try{ document.getElementById("root").innerHTML='<div style="padding:24px;color:#b91c1c">เกิดข้อผิดพลาด: '+(e&&e.message||e)+' — รีเฟรช (Ctrl+Shift+R) หรือเปิดใน Chrome/Safari</div>'; }catch(_){} }
</script>
