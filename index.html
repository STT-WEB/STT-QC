<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>STT QC System</title>
<style>
:root{--stt-red:#D81E2C;--stt-red-dark:#A6121E;--stt-red-soft:#fdecee;--ink:#1f2937;--ink-soft:#6b7280;--line:#e5e7eb;--bg:#f3f4f6;--card:#fff;--ok:#16a34a;--bad:#dc2626;--warn:#f59e0b;--na:#9ca3af;--radius:14px;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 14px rgba(0,0,0,.04)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:'Segoe UI','Sarabun',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:15px}
.appbar{position:sticky;top:0;z-index:30;background:var(--stt-red);color:#fff;display:flex;align-items:center;gap:10px;padding:10px 14px;box-shadow:0 2px 8px rgba(0,0,0,.15);flex-wrap:wrap}
.appbar .logo{font-weight:800;letter-spacing:1px;font-size:18px;display:flex;align-items:center;gap:8px}
.appbar .logo .mark{background:#fff;color:var(--stt-red);border-radius:6px;padding:1px 7px;font-weight:900;transform:skewX(-8deg)}
.appbar .spacer{flex:1}
.appbar .who{font-size:13px;opacity:.95;text-align:right;line-height:1.2}
.appbar button.ghost{background:rgba(255,255,255,.15);border:0;color:#fff;border-radius:8px;padding:7px 12px;font-size:13px}
.langbar{display:flex;gap:4px;flex-wrap:wrap}
.langbar button{border:0;border-radius:6px;padding:4px 8px;font-size:12px;font-weight:700;background:rgba(255,255,255,.2);color:#fff}
.langbar button.on{background:#fff;color:var(--stt-red)}
.wrap{max-width:1000px;margin:0 auto;padding:16px 14px 60px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
.btn{background:var(--stt-red);color:#fff;border:0;border-radius:10px;padding:12px 18px;font-weight:700;font-size:15px}
.btn:hover{background:var(--stt-red-dark)}
.btn.sec{background:#fff;color:var(--stt-red);border:1.5px solid var(--stt-red)}
.btn.grey{background:#eef0f3;color:var(--ink)}
.btn.block{width:100%}
.btn.sm{padding:7px 12px;font-size:13px}
.row{display:flex;gap:10px;flex-wrap:wrap}
.field{margin-bottom:12px;flex:1;min-width:150px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;background:#fff;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--stt-red)}
h1{font-size:22px;margin:0 0 4px}h2{font-size:18px;margin:0 0 12px}
.muted{color:var(--ink-soft);font-size:13px}
.pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:700}
.pill.ok{background:#dcfce7;color:#166534}.pill.bad{background:#fee2e2;color:#991b1b}.pill.warn{background:#fef3c7;color:#92400e}.pill.draft{background:#e5e7eb;color:#374151}.pill.na{background:#f1f5f9;color:#475569}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,var(--stt-red),var(--stt-red-dark))}
.login-card{background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.3);padding:30px;width:100%;max-width:380px}
.login-card .brand{text-align:center;margin-bottom:14px}
.login-card .brand .mark{font-size:30px;font-weight:900;color:var(--stt-red);letter-spacing:1px}
.login-card .brand .sub{color:var(--ink-soft);font-size:13px;margin-top:2px}
.langbar.dark button{background:#f1f1f3;color:#444}.langbar.dark button.on{background:var(--stt-red);color:#fff}
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
.tile{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;text-align:center;position:relative}
.tile.active{cursor:pointer}.tile.active:hover{border-color:var(--stt-red)}
.tile.soon{opacity:.55}
.tile .ic{font-size:34px;margin-bottom:8px}.tile .nm{font-weight:700}
.tile .tag{position:absolute;top:8px;right:8px}
.stepper{display:flex;overflow-x:auto;gap:6px;padding:6px 2px 12px;margin-bottom:6px}
.step{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;min-width:78px;text-align:center;opacity:.5}
.step.active{opacity:1}.step.done{opacity:1}
.step .circ{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;border:2px solid var(--line);background:#fff;color:var(--ink-soft);font-size:16px}
.step.active .circ{border-color:var(--stt-red);color:var(--stt-red);background:var(--stt-red-soft)}
.step.done .circ{border-color:var(--ok);background:var(--ok);color:#fff}
.step .lbl{font-size:11px;margin-top:5px;line-height:1.2}
.guide-box{background:var(--stt-red-soft);border-left:4px solid var(--stt-red);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:13.5px}
.guide-box b{color:var(--stt-red-dark)}
.tbl-scroll{overflow-x:auto}
table.data{border-collapse:collapse;width:100%;min-width:560px;font-size:13px}
table.data th,table.data td{border:1px solid var(--line);padding:6px 8px;text-align:center}
table.data th{background:#f8fafc;font-weight:700}
.rowlabel{background:#f8fafc;font-weight:600;text-align:left!important;white-space:nowrap}
.chk-item{display:flex;align-items:center;gap:8px;padding:9px 6px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.chk-item .no{width:26px;height:26px;border-radius:50%;background:#eef0f3;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex:0 0 auto}
.chk-item .desc{flex:1;min-width:140px;font-size:13.5px}
.seg{display:inline-flex;border:1.5px solid var(--line);border-radius:8px;overflow:hidden}
.seg button{border:0;background:#fff;padding:6px 10px;font-size:12px;font-weight:700;color:var(--ink-soft);border-left:1px solid var(--line)}
.seg button:first-child{border-left:0}
.seg button.on-ok{background:var(--ok);color:#fff}.seg button.on-bad{background:var(--bad);color:#fff}.seg button.on-na{background:var(--na);color:#fff}
.comp-card{border:1.5px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px}
.comp-card .hd{font-weight:800;color:var(--stt-red-dark);margin-bottom:10px;font-size:16px}
.slot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-top:6px}
.slot{border:1.5px dashed var(--line);border-radius:10px;overflow:hidden;background:#fafafa;position:relative}
.slot .lab{font-size:11px;font-weight:700;color:var(--ink-soft);padding:5px 6px;background:#f3f4f6;text-align:center}
.slot .ph{aspect-ratio:1;display:flex;align-items:center;justify-content:center;cursor:pointer}
.slot .ph img{width:100%;height:100%;object-fit:cover}
.slot .ph .add{color:var(--ink-soft);font-size:24px}
.slot .del{position:absolute;top:24px;right:4px;background:rgba(0,0,0,.6);color:#fff;border:0;border-radius:50%;width:22px;height:22px;font-size:13px;line-height:1}
.up-note{font-size:11px;color:var(--ink-soft);margin-top:6px}
.rep-item{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;cursor:pointer;background:#fff}
.rep-item:hover{border-color:var(--stt-red);background:var(--stt-red-soft)}
.rep-item .docno{font-weight:800;color:var(--stt-red-dark)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:10px;z-index:100;box-shadow:var(--shadow);font-size:14px;opacity:0;transition:opacity .2s;max-width:90%;text-align:center}
.toast.show{opacity:1}
.banner{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:14px}
.banner.demo{background:#fff7ed;border:1px solid #fdba74;color:#9a3412}
.crumb{font-size:13px;color:var(--ink-soft);margin-bottom:10px;cursor:pointer}
.howto-step{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
.howto-step .hd{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#f8fafc;cursor:pointer}
.howto-step .hd .n{width:30px;height:30px;border-radius:8px;background:var(--stt-red);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;flex:0 0 auto}
.howto-step .bd{padding:0 14px;max-height:0;overflow:hidden;transition:max-height .25s,padding .25s}
.howto-step.open .bd{max-height:600px;padding:12px 14px}
.cond-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px}
.cond-grid label{display:flex;align-items:center;gap:6px;font-size:13px;padding:6px;border:1px solid var(--line);border-radius:8px;cursor:pointer}
.cond-grid input{width:auto}
.sign-grid{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-top:24px}
.sign-box{flex:1;min-width:160px;text-align:center}
.sign-line{border-top:1px dotted #555;margin-top:46px;padding-top:6px;font-size:13px}
.page{background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:18px;margin-bottom:16px;display:flex;flex-direction:column}
.page-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--stt-red);padding-bottom:8px;margin-bottom:12px}
.page-head .t1{font-weight:900;color:var(--stt-red);font-size:20px;line-height:1}
.page-body{flex:1}
.page-foot{display:flex;justify-content:space-between;gap:8px;border-top:1px solid var(--line);margin-top:14px;padding-top:8px;font-size:12px;color:var(--ink-soft)}
.rep-photos{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.rep-photos .c{border:1px solid var(--line);border-radius:8px;overflow:hidden}
.rep-photos .c .lab{font-size:11px;font-weight:700;text-align:center;background:#f3f4f6;padding:4px}
.rep-photos .c img{width:100%;display:block;aspect-ratio:1;object-fit:cover}
@media print{
  .appbar,.no-print,.stepper,.crumb,.toast{display:none!important}
  body{background:#fff}.wrap{max-width:none;padding:0}
  .card{box-shadow:none;border:1px solid #999;page-break-inside:avoid}
  .page{border:none;border-radius:0;box-shadow:none;margin:0;min-height:96vh;page-break-after:always}
  .page:last-child{page-break-after:auto}
}
</style>
</head>

async function uploadImage(file){
  if(CONFIG.LIVE_PHOTO_ONLY){ const ageMin=(Date.now()-(file.lastModified||0))/60000; if(isFinite(ageMin) && ageMin>CONFIG.LIVE_PHOTO_MAX_AGE_MIN){ throw new Error("LIVE_ONLY"); } }
  const b64=await new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(file);});
  if(DEMO || CONFIG.IMGBB_KEY.startsWith("YOUR_")) return b64;
  const fd=new FormData(); fd.append("image", b64.split(",")[1]);
  const res=await fetch("https://api.imgbb.com/1/upload?key="+CONFIG.IMGBB_KEY,{method:"POST",body:fd});
  const j=await res.json(); if(j&&j.success) return j.data.url; throw new Error("upload failed");
}

let DRAFT=null, CUR=0, STEPS=[];
function blankComp(){return{vol1:"",vol2:"",u1:"",u2:"",bot1:"",bot2:"",h:"",void_l:"",seal_plate:"",seal_cap:"STT",ph_lv1:"",ph_lv2:"",ph_seal:"",ph_name:""};}
function buildSteps(){
  const s=[{key:"job",ic:"📋"}];
  if(isJM(DRAFT.job_type)){ s.push({key:"before",ic:"🅑"}); s.push({key:"after",ic:"🅐"}); }
  else { s.push({key:"check",ic:"✓"}); }
  s.push({key:"table",ic:"💧"},{key:"seal",ic:"🔒"},{key:"chassis",ic:"🚛"},{key:"summary",ic:"🏁"});
  STEPS=s;
}
function NewReportView(){
  if(!DRAFT){
    DRAFT={job_type:"JM",sa:"",job_no:"",measure_date:new Date().toISOString().slice(0,10),customer:"",address:"",plate_head:"",plate_tank:"",chassis_head:"",chassis_tank:"",capacity:"",vehicle_type:VEHICLE_TYPES[0],product:PRODUCT_TYPES[0],model_no:"",tank_origin:TANK_ORIGINS[0],conditions:[],location:"บริษัท สุธี แท็งเกอร์",n_comp:8,comps:Array.from({length:8},blankComp),checklist_before:[],checklist_after:[],seal_slots:{},chassis_slots:{},conclusion:"pass",remark:""};
    CUR=0;
  }
  buildSteps();
  $("#page").innerHTML=`
    <div class="crumb" onclick="if(confirm('ออกโดยไม่บันทึก? / Exit without saving?')){DRAFT=null;go('home');}">${t('cancel')}</div>
    <h1>${t('newTitle')}</h1>
    <div class="stepper" id="stepper"></div>
    <div id="stepbody"></div>
    <div class="row no-print" style="margin-top:16px">
      <button class="btn grey" id="btnPrev" onclick="stepPrev()">${t('prev')}</button>
      <div style="flex:1"></div>
      <button class="btn" id="btnNext" onclick="stepNext()">${t('next')}</button>
    </div>`;
  drawStepper(); drawStep();
}
function drawStepper(){ $("#stepper").innerHTML=STEPS.map((s,i)=>`<div class="step ${i===CUR?'active':''} ${i<CUR?'done':''}"><div class="circ">${i<CUR?'✓':s.ic}</div><div class="lbl">${i+1}. ${t('step_'+s.key)}</div></div>`).join(""); }
function curKey(){ return STEPS[CUR].key; }
function drawStep(){
  const b=$("#stepbody"), k=curKey();
  $("#btnPrev").style.visibility=CUR===0?"hidden":"visible";
  $("#btnNext").textContent=CUR===STEPS.length-1?t('saveBtn'):t('next');
  if(k==="job") b.innerHTML=stepJob();
  else if(k==="before"||k==="check") b.innerHTML=stepChecklist("before");
  else if(k==="after") b.innerHTML=stepChecklist("after");
  else if(k==="table") b.innerHTML=stepTable();
  else if(k==="seal") b.innerHTML=stepSlots("seal_slots",SEAL_SLOTS,"🔒 จุดร้อยซีล + เช็คลมยาง / Seals + tire","ถ่ายให้ครบตามหัวข้อ (ตามข้อกำหนด) / Take all required photos");
  else if(k==="chassis") b.innerHTML=stepSlots("chassis_slots",CHASSIS_SLOTS,"🚛 Chassis / Name Plate","ถ่าย: หน้ารถ, ท้ายรถ, เลขคัสซี, เนมเพลท / front, rear, chassis no., name plate");
  else if(k==="summary") b.innerHTML=stepSummary();
  bindStep();
}

function onJobTypeChange(){ DRAFT.job_type=gv("f_job_type"); buildSteps(); drawStep(); }
async function lookupVehicle(){
  const key=gv("f_lookup").trim(); if(!key) return toast("พิมพ์ทะเบียน/คัสซีก่อน");
  collectStep(); toast("...");
  let v=null; try{v=await DB.getVehicle(key);}catch(e){return toast("ค้นหาไม่สำเร็จ");}
  if(!v) return toast("ไม่พบรถคันนี้ / Vehicle not found");
  ["customer","address","plate_head","plate_tank","chassis_head","chassis_tank","capacity","vehicle_type","product","model_no","tank_origin"].forEach(k=>{ if(v[k]) DRAFT[k]=v[k]; });
  drawStep(); toast("ดึงข้อมูลรถสำเร็จ / Loaded");
}
function stepChecklist(phase){
  const list=chkList(DRAFT.vehicle_type);
  const arrKey = phase==="after"?"checklist_after":"checklist_before";
  if(DRAFT[arrKey].length!==list.length) DRAFT[arrKey]=list.map(()=>"");
  const jm=isJM(DRAFT.job_type);
  const title = phase==="after"?"ตรวจสอบหลังซ่อม (After)":(jm?"ตรวจสอบก่อนซ่อม (Before)":"ตรวจสอบระบบ");
  const note = phase==="before"&&jm ? 'ถ้ามีข้อ "ไม่ผ่าน" ระบบจะแจ้งกลุ่ม Sale ให้เสนอราคา / Any "Fail" alerts Sales' : "เลือกผลแต่ละข้อ / Choose each result";
  return `<div class="card">
    <div class="guide-box">✓ <b>${title}:</b> ${note}</div>
    ${list.map((d,i)=>`<div class="chk-item">
      <div class="no">${i+1}</div><div class="desc">${esc(d)}</div>
      <div class="seg" data-arr="${arrKey}" data-i="${i}">
        <button data-v="pass" class="${DRAFT[arrKey][i]==='pass'?'on-ok':''}">${t('chkPass')}</button>
        <button data-v="na" class="${DRAFT[arrKey][i]==='na'?'on-na':''}">${t('chkNA')}</button>
        <button data-v="fail" class="${DRAFT[arrKey][i]==='fail'?'on-bad':''}">${t('chkFail')}</button>
      </div></div>`).join("")}
  </div>`;
}
function stepTable(){
  const n=DRAFT.n_comp;
  if(DRAFT.comps.length!==n){ DRAFT.comps=Array.from({length:n},(_,i)=>DRAFT.comps[i]||blankComp()); }
  return `<div class="card">
    <div class="guide-box">💧 <b>ตารางวัดน้ำ (ทีละช่อง) / Gauging per compartment:</b> กรอกค่า + ถ่ายรูปตาม slot</div>
    ${DRAFT.comps.map((c,i)=>compCard(c,i)).join("")}
  </div>`;
}
function compCard(c,i){
  const f=(k,lab,ph)=>`<div class="field"><label>${lab}</label><input data-c="${i}" data-k="${k}" value="${esc(c[k])}" placeholder="${ph||''}"></div>`;
  return `<div class="comp-card">
    <div class="hd">ช่องที่ ${i+1} / Comp ${i+1}</div>
    <div class="row">${f("vol1","ปริมาตรระดับ 1 (ล.)","6000")}${f("vol2","ปริมาตรระดับ Max (ล.)","9000")}${f("void_l","Void (≥227 ล.)","")}</div>
    <div class="row">${f("u1","U ระดับ1 (มม.)")}${f("u2","U ระดับMax (มม.)")}${f("bot1","ก้น-แป้น ระดับ1")}${f("bot2","ก้น-แป้น ระดับMax")}${f("h","H (มม.)")}</div>
    <div class="row">${f("seal_plate","เลขซีลแป้น / Plate seal")}${f("seal_cap","เลขซีลฝา / Cap seal")}</div>
    <div class="slot-grid">${COMP_SLOTS.map(s=>slotHtml("comp",i,s.k,s.l,c[s.k])).join("")}</div>

function stepSlots(target,labels,title,hint){
  const store=DRAFT[target]||{};
  return `<div class="card"><div class="guide-box">📷 <b>${title}</b><br>${hint}</div>
    <div class="slot-grid">${labels.map((lab,idx)=>slotHtml(target,idx,idx,lab,store[idx])).join("")}</div></div>`;
}
function slotHtml(target,a,b,label,url){
  const attr = target==="comp" ? `data-target="comp" data-ci="${a}" data-key="${b}"` : `data-target="${target}" data-idx="${b}"`;
  return `<div class="slot"><div class="lab">${esc(label)}</div>
    <label class="ph">${url?`<img src="${esc(url)}">`:`<span class="add">📷＋</span>`}<input type="file" accept="image/*" capture="environment" style="display:none" class="slot-input" ${attr}></label>
    ${url?`<button class="del" ${attr} data-del="1">×</button>`:''}</div>`;
}
function stepSummary(){
  const failsB=(DRAFT.checklist_before||[]).filter(x=>x==='fail').length;
  return `<div class="card">
    <div class="guide-box">🏁 <b>สรุปผล / Summary:</b> ผู้จัดทำ (${esc(USER.name)})</div>
    ${failsB>0?`<div class="banner" style="background:#fef2f2;border:1px solid #fca5a5;color:#991b1b">⚠️ Before ไม่ผ่าน ${failsB} ข้อ — ระบบจะเตรียมข้อความแจ้ง Sale</div>`:''}

        <option value="fail" ${DRAFT.conclusion==='fail'?'selected':''}>ไม่ผ่าน (UN ACCEPT)</option>
      </select></div>

    <div class="muted">ผู้จัดทำ (QC): <b>${esc(USER.name)}</b> • ${DRAFT.measure_date}</div>

function bindStep(){
  document.querySelectorAll("#stepbody input,#stepbody select,#stepbody textarea").forEach(el=>{ if(el.type==="file"||el.classList.contains("f_cond")) return; el.addEventListener("change",collectStep); });
  document.querySelectorAll("#stepbody input[data-c]").forEach(inp=>{ inp.addEventListener("input",()=>{DRAFT.comps[+inp.dataset.c][inp.dataset.k]=inp.value;}); });
  document.querySelectorAll(".seg").forEach(seg=>{ seg.querySelectorAll("button").forEach(btn=>btn.onclick=()=>{ const arr=seg.dataset.arr,i=+seg.dataset.i,v=btn.dataset.v; DRAFT[arr][i]=v; seg.querySelectorAll("button").forEach(b=>b.classList.remove("on-ok","on-bad","on-na")); btn.classList.add(v==='pass'?'on-ok':v==='fail'?'on-bad':'on-na'); }); });
  document.querySelectorAll(".slot-input").forEach(inp=>{ inp.onchange=async e=>{ const f=e.target.files[0]; if(!f) return; toast(t('uploading')); let url; try{ url=await uploadImage(f);}catch(err){ return toast(err.message==="LIVE_ONLY"?t('liveOnly'):"อัปโหลดไม่สำเร็จ"); } storeSlot(inp.dataset,url); drawStep(); }; });
  document.querySelectorAll(".del[data-del]").forEach(btn=>{ btn.onclick=()=>{ storeSlot(btn.dataset,""); drawStep(); }; });
}
function storeSlot(ds,url){ if(ds.target==="comp"){ DRAFT.comps[+ds.ci][ds.key]=url; } else { DRAFT[ds.target]=DRAFT[ds.target]||{}; DRAFT[ds.target][ds.idx]=url; } }
function collectStep(){
  const k=curKey();
  if(k==="job"){
    DRAFT.job_type=gv("f_job_type");DRAFT.job_no=gv("f_job_no");DRAFT.sa=gv("f_sa");DRAFT.measure_date=gv("f_measure_date");
    DRAFT.customer=gv("f_customer");DRAFT.address=gv("f_address");DRAFT.plate_head=gv("f_plate_head");DRAFT.plate_tank=gv("f_plate_tank");DRAFT.chassis_head=gv("f_chassis_head");DRAFT.chassis_tank=gv("f_chassis_tank");
    DRAFT.capacity=gv("f_capacity");DRAFT.vehicle_type=gv("f_vehicle_type");DRAFT.product=gv("f_product");DRAFT.model_no=gv("f_model_no");DRAFT.n_comp=Math.max(1,Math.min(12,+gv("f_n_comp")||8));
    if(isJM(DRAFT.job_type)) DRAFT.tank_origin=gv("f_tank_origin");
    DRAFT.conditions=Array.from(document.querySelectorAll(".f_cond:checked")).map(x=>x.value);
  }
  if(k==="summary"){ DRAFT.conclusion=gv("f_conclusion"); DRAFT.remark=gv("f_remark"); }
}
function validateStep(){
  collectStep(); const k=curKey();
  if(k==="job"){ if(!DRAFT.customer.trim()){toast(t('needName'));return false;} if(!DRAFT.sa.trim()){toast(t('needSA'));return false;} }
  if(k==="before"||k==="check"){ if((DRAFT.checklist_before||[]).some(x=>!x)){toast(t('needChk'));return false;} }
  return true;
}
function stepPrev(){ if(CUR>0){CUR--;drawStepper();drawStep();window.scrollTo(0,0);} }
function stepNext(){ if(!validateStep())return; if(CUR<STEPS.length-1){CUR++;drawStepper();drawStep();window.scrollTo(0,0);} else saveDraft(); }
async function saveDraft(){
  collectStep(); toast(t('saving'));
  const rec={job_type:DRAFT.job_type,sa:DRAFT.sa,job_no:DRAFT.job_no,measure_date:DRAFT.measure_date,customer:DRAFT.customer,address:DRAFT.address,plate_head:DRAFT.plate_head,plate_tank:DRAFT.plate_tank,chassis_head:DRAFT.chassis_head,chassis_tank:DRAFT.chassis_tank,capacity:DRAFT.capacity,vehicle_type:DRAFT.vehicle_type,product:DRAFT.product,model_no:DRAFT.model_no,tank_origin:isJM(DRAFT.job_type)?DRAFT.tank_origin:"",conditions:(DRAFT.conditions||[]).join(", "),location:DRAFT.location,status:DRAFT.conclusion,created_by:USER.name,
    data:{n_comp:DRAFT.n_comp,comps:DRAFT.comps,checklist_before:DRAFT.checklist_before,checklist_after:DRAFT.checklist_after,seal_slots:DRAFT.seal_slots,chassis_slots:DRAFT.chassis_slots,conditions:DRAFT.conditions,conclusion:DRAFT.conclusion,remark:DRAFT.remark}};
  let saved; try{ saved=await DB.saveReport(rec);}catch(e){ return toast("บันทึกไม่สำเร็จ — เช็คการเชื่อมต่อ"); }
  const beforeFails=(DRAFT.checklist_before||[]).map((v,i)=>v==='fail'?chkList(DRAFT.vehicle_type)[i]:null).filter(Boolean);
  if(beforeFails.length || saved.status==='needs_fix' || saved.status==='fail') alertSale(saved,beforeFails);
  DRAFT=null; toast("บันทึกสำเร็จ: "+saved.doc_no); go("detail",saved.id);
}
function alertSale(rec,beforeFails){
  const items=(beforeFails&&beforeFails.length)?("\nBefore ไม่ผ่าน:\n- "+beforeFails.join("\n- ")):"";
  const msg=`🔧 แจ้งงานต้องแก้ไข/เสนอราคา\nเลขเอกสาร: ${rec.doc_no}\nงาน: ${rec.job_type} • SA ${rec.sa||'-'}\nลูกค้า: ${rec.customer}\nทะเบียน: ${rec.plate_tank}\nแท็งค์: ${rec.tank_origin||'-'}${items}\nหมายเหตุ: ${(rec.data?rec.data.remark:rec.remark)||'-'}\nผู้ตรวจ: ${USER.name}`;
  if(navigator.share){navigator.share({title:"แจ้งกลุ่ม Sale",text:msg}).catch(()=>{});}
  else{navigator.clipboard?.writeText(msg);toast("คัดลอกข้อความแจ้ง Sale แล้ว");}
}

  const q=$("#q")?$("#q").value.trim():"";
  let rows=[]; try{rows=await DB.searchReports(q);}catch(e){$("#results").innerHTML='<p class="muted">โหลดไม่ได้</p>';return;}
  $("#results").innerHTML = rows.length? rows.map(r=>`
    <div class="rep-item" onclick="go('detail',${JSON.stringify(String(r.id))})">
      <div style="flex:1"><div class="docno">${esc(r.doc_no)}</div>
        <div class="muted">${esc(r.customer)} • ${esc(r.plate_tank||'-')} • ${esc(r.measure_date||'')}</div>
        <div class="muted">${esc(r.created_by)} • ปริ้น ${r.print_count||0}</div></div>${statusPill(r.status)}
    </div>`).join("") : `<p class="muted">${t('noReport')}</p>`;
}

    <div class="row">
      <div style="flex:1;min-width:200px">
        <div><b>ลูกค้า:</b> ${esc(r.customer)}</div><div><b>ที่อยู่:</b> ${esc(r.address||'-')}</div>
        <div><b>Job:</b> ${esc(thai(r.job_type))} ${esc(r.job_no||'')} • <b>SA:</b> ${esc(r.sa||'-')}</div>
        <div><b>วันที่วัดน้ำ:</b> ${esc(r.measure_date||'-')}</div>${r.tank_origin?`<div><b>ประเภทแท็งค์:</b> ${esc(thai(r.tank_origin))}</div>`:''}
      </div>
      <div style="flex:1;min-width:200px">
        <div><b>ทะเบียนหัว/แท็งก์:</b> ${esc(r.plate_head||'-')} / ${esc(r.plate_tank||'-')}</div>
        <div><b>คัสซีหัว/หาง:</b> ${esc(r.chassis_head||'-')} / ${esc(r.chassis_tank||'-')}</div>
        <div><b>ความจุ:</b> ${esc(r.capacity||'-')} ลิตร • ${esc(thai(r.product))}</div>
        <div><b>ประเภทรถ:</b> ${esc(thai(r.vehicle_type))} • รุ่น ${esc(r.model_no||'-')}</div>
      </div>
    </div>
    ${(d.conditions&&d.conditions.length)?`<div style="margin-top:10px"><b>เงื่อนไขการวัดน้ำ:</b> ${esc(d.conditions.map(thai).join(", "))}</div>`:''}
    <div class="guide-box" style="margin-top:12px">${esc(WATER_TERM)}</div>`);
  pages.push(`<h2>ข้อมูลการวัดน้ำ (${comp.length} ช่อง)</h2>
    <div class="tbl-scroll"><table class="data">
      <tr><th class="rowlabel">ช่องที่</th>${comp.map((_,i)=>`<th>${i+1}</th>`).join("")}</tr>
      <tr><td class="rowlabel">ปริมาตร ระดับ1</td>${comp.map(c=>`<td>${esc(c.vol1)}</td>`).join("")}</tr>
      <tr><td class="rowlabel">ปริมาตร ระดับMax</td>${comp.map(c=>`<td>${esc(c.vol2)}</td>`).join("")}</tr>
      <tr><td class="rowlabel">U ระดับ1</td>${comp.map(c=>`<td>${esc(c.u1)}</td>`).join("")}</tr>
      <tr><td class="rowlabel">U ระดับMax</td>${comp.map(c=>`<td>${esc(c.u2)}</td>`).join("")}</tr>
      <tr><td class="rowlabel">ก้น-แป้น ระดับ1</td>${comp.map(c=>`<td>${esc(c.bot1)}</td>`).join("")}</tr>
      <tr><td class="rowlabel">ก้น-แป้น ระดับMax</td>${comp.map(c=>`<td>${esc(c.bot2)}</td>`).join("")}</tr>
      <tr><td class="rowlabel">H</td>${comp.map(c=>`<td>${esc(c.h)}</td>`).join("")}</tr>
      <tr><td class="rowlabel">Void</td>${comp.map(c=>`<td>${esc(c.void_l)}</td>`).join("")}</tr>
      <tr><td class="rowlabel">ซีลแป้น</td>${comp.map(c=>`<td>${esc(c.seal_plate)}</td>`).join("")}</tr>
      <tr><td class="rowlabel">ซีลฝา</td>${comp.map(c=>`<td>${esc(c.seal_cap)}</td>`).join("")}</tr>
    </table></div>`);
  comp.forEach((c,i)=>{ const ph=COMP_SLOTS.map(s=>c[s.k]?`<div class="c"><div class="lab">${esc(thai(s.l))}</div><img src="${esc(c[s.k])}"></div>`:'').join(""); if(ph) pages.push(`<h2>รูปช่องที่ ${i+1}</h2><div class="rep-photos">${ph}</div>`); });
  const sealPh=SEAL_SLOTS.map((lab,idx)=>(d.seal_slots&&d.seal_slots[idx])?`<div class="c"><div class="lab">${esc(thai(lab))}</div><img src="${esc(d.seal_slots[idx])}"></div>`:'').join("");
  if(sealPh) pages.push(`<h2>จุดร้อยซีล + เช็คลมยาง</h2><div class="rep-photos">${sealPh}</div>`);
  const chPh=CHASSIS_SLOTS.map((lab,idx)=>(d.chassis_slots&&d.chassis_slots[idx])?`<div class="c"><div class="lab">${esc(thai(lab))}</div><img src="${esc(d.chassis_slots[idx])}"></div>`:'').join("");
  if(chPh) pages.push(`<h2>Chassis / Name Plate</h2><div class="rep-photos">${chPh}</div>`);
  const renderChk=(arr,title)=> (arr&&arr.length)?`<h2>${title}</h2>${arr.map((v,i)=>`<div class="chk-item"><div class="no">${i+1}</div><div class="desc">${esc(thai(list[i]||''))}</div>${triple(v)}</div>`).join("")}`:'';
  let lastPage = renderChk(d.checklist_before, isJM(r.job_type)?"ผลตรวจก่อนซ่อม (Before)":"ผลการตรวจสอบระบบ");
  if(isJM(r.job_type)) lastPage += renderChk(d.checklist_after,"ผลตรวจหลังซ่อม (After)");
  if(d.remark) lastPage += `<div class="guide-box" style="margin-top:12px"><b>หมายเหตุ:</b> ${esc(d.remark)}</div>`;
  lastPage += `<div class="sign-grid">
      <div class="sign-box"><div class="sign-line">ผู้ตรวจสอบ (QC Inspector)</div><div style="margin-top:4px">${maker}</div><div class="muted">วันที่ ${cdate}</div></div>
      <div class="sign-box"><div class="sign-line">ผู้รับรอง (Approved by)</div></div>
      <div class="sign-box"><div class="sign-line">Factory Manager</div></div>
    </div>`;
  pages.push(lastPage);
  const total=pages.length;
  const head=`<div class="page-head"><div><div class="t1">SUTEE TANKERS</div><div class="muted">REPORT การวัดน้ำ</div></div>
      <div style="text-align:right"><div class="docno" style="font-size:18px;color:var(--stt-red-dark);font-weight:800">${esc(r.doc_no)}</div>${statusPill(r.status)}</div></div>`;
  const foot=n=>`<div class="page-foot"><div>ผู้จัดทำ: <b>${maker}</b></div><div>วันที่จัดทำ: ${cdate}</div><div>หน้า ${n} / ${total}</div></div>`;
  const pagesHtml=pages.map((c,i)=>`<div class="page">${head}<div class="page-body">${c}</div>${foot(i+1)}</div>`).join("");
  $("#page").innerHTML=`
    <div class="crumb no-print" onclick="go('search')">${t('back')}</div>
    <div id="printable">${pagesHtml}</div>
    <div class="card no-print">
      <div class="row" style="align-items:center">
        <button class="btn" onclick="doPrint(${JSON.stringify(String(r.id))})">${t('printBtn')}</button>
        ${(r.status==='needs_fix'||r.status==='fail')?`<button class="btn sec" onclick='reAlert(${JSON.stringify(r).replace(/'/g,"&#39;")})'>📣 แจ้งกลุ่ม Sale</button>`:''}
        <div style="flex:1"></div>
        <div class="muted">ปริ้นไปแล้ว <b>${r.print_count||0}</b> ครั้ง${r.last_printed_by?` • ล่าสุดโดย ${esc(r.last_printed_by)}`:''}</div>
      </div>
      <p class="up-note">กด "พิมพ์/บันทึก PDF" แล้วเลือก "บันทึกเป็น PDF (Save as PDF)" จะได้ไฟล์ PDF พร้อมช่องเซ็น</p>
      ${logs.length?`<div style="margin-top:6px"><b>ประวัติการพิมพ์</b>${logs.map(l=>`<div class="muted">• ${esc(l.printed_by)} — ${new Date(l.printed_at).toLocaleString('th-TH')}</div>`).join("")}</div>`:''}
    </div>`;
}
async function doPrint(id){ await DB.logPrint(id,USER.name).catch(()=>{}); toast("บันทึกการพิมพ์โดย "+USER.name); setTimeout(()=>window.print(),350); }
function reAlert(r){ alertSale(r,[]); }
render("home");
</script>
</body>
</html>
