<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>STT QC System</title>
<style>
:root{--stt-red:#D81E2C;--stt-red-dark:#A6121E;--stt-red-soft:#fdecee;--ink:#1f2937;--ink-soft:#6b7280;--line:#e5e7eb;--bg:#f3f4f6;--card:#fff;--ok:#16a34a;--bad:#dc2626;--warn:#f59e0b;--na:#9ca3af;--radius:14px;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 14px rgba(0,0,0,.04)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:'Segoe UI','Sarabun',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:15px}
.appbar{position:sticky;top:0;z-index:30;background:var(--stt-red);color:#fff;display:flex;align-items:center;gap:10px;padding:10px 14px;box-shadow:0 2px 8px rgba(0,0,0,.15);flex-wrap:wrap}
.appbar .logo{font-weight:800;letter-spacing:1px;font-size:18px;display:flex;align-items:center;gap:8px}
.appbar .logo .mark{background:#fff;color:var(--stt-red);border-radius:6px;padding:1px 7px;font-weight:900;transform:skewX(-8deg)}
.appbar .spacer{flex:1}.appbar .who{font-size:13px;opacity:.95;text-align:right;line-height:1.2}
.appbar button.ghost{background:rgba(255,255,255,.15);border:0;color:#fff;border-radius:8px;padding:7px 12px;font-size:13px}
.langbar{display:flex;gap:4px;flex-wrap:wrap}
.langbar button{border:0;border-radius:6px;padding:4px 8px;font-size:12px;font-weight:700;background:rgba(255,255,255,.2);color:#fff}
.langbar button.on{background:#fff;color:var(--stt-red)}
.langbar.dark button{background:#f1f1f3;color:#444}.langbar.dark button.on{background:var(--stt-red);color:#fff}
.wrap{max-width:1000px;margin:0 auto;padding:16px 14px 60px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
.btn{background:var(--stt-red);color:#fff;border:0;border-radius:10px;padding:12px 18px;font-weight:700;font-size:15px}
.btn:hover{background:var(--stt-red-dark)}
.btn.sec{background:#fff;color:var(--stt-red);border:1.5px solid var(--stt-red)}
.btn.grey{background:#eef0f3;color:var(--ink)}
.btn.block{width:100%}.btn.sm{padding:7px 12px;font-size:13px}
.row{display:flex;gap:10px;flex-wrap:wrap}
.field{margin-bottom:12px;flex:1;min-width:150px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;background:#fff;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--stt-red)}
h1{font-size:22px;margin:0 0 4px}h2{font-size:18px;margin:0 0 12px}
.muted{color:var(--ink-soft);font-size:13px}
.pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:700}
.pill.ok{background:#dcfce7;color:#166534}.pill.bad{background:#fee2e2;color:#991b1b}.pill.warn{background:#fef3c7;color:#92400e}.pill.draft{background:#e5e7eb;color:#374151}.pill.na{background:#f1f5f9;color:#475569}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,var(--stt-red),var(--stt-red-dark))}
.login-card{background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.3);padding:30px;width:100%;max-width:380px}
.login-card .brand{text-align:center;margin-bottom:14px}
.login-card .brand .mark{font-size:30px;font-weight:900;color:var(--stt-red);letter-spacing:1px}
.login-card .brand .sub{color:var(--ink-soft);font-size:13px;margin-top:2px}
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
.tile{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;text-align:center;position:relative}
.tile.active{cursor:pointer}.tile.active:hover{border-color:var(--stt-red)}.tile.soon{opacity:.55}
.tile .ic{font-size:34px;margin-bottom:8px}.tile .nm{font-weight:700}.tile .tag{position:absolute;top:8px;right:8px}
.docnote{background:#eef2ff;border:1px solid #c7d2fe;border-radius:10px;padding:9px 12px;margin-bottom:12px;font-size:14px}
.docnote b{color:var(--stt-red-dark);font-size:17px}.docnote.pending{background:#f8fafc;border-color:var(--line);color:var(--ink-soft)}
.stepper{display:flex;overflow-x:auto;gap:6px;padding:6px 2px 12px;margin-bottom:6px}
.step{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;min-width:78px;text-align:center;opacity:.5}
.step.active{opacity:1}.step.done{opacity:1}
.step .circ{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;border:2px solid var(--line);background:#fff;color:var(--ink-soft);font-size:16px}
.step.active .circ{border-color:var(--stt-red);color:var(--stt-red);background:var(--stt-red-soft)}
.step.done .circ{border-color:var(--ok);background:var(--ok);color:#fff}
.step .lbl{font-size:11px;margin-top:5px;line-height:1.2}
.guide-box{background:var(--stt-red-soft);border-left:4px solid var(--stt-red);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:13.5px}
.guide-box b{color:var(--stt-red-dark)}
.tbl-scroll{overflow-x:auto}
table.data{border-collapse:collapse;width:100%;min-width:560px;font-size:13px}
table.data th,table.data td{border:1px solid var(--line);padding:6px 8px;text-align:center}
table.data th{background:#f8fafc;font-weight:700}
.rowlabel{background:#f8fafc;font-weight:600;text-align:left!important;white-space:nowrap}
.grp{font-weight:800;color:var(--stt-red-dark);margin:14px 0 4px;font-size:14px;border-bottom:1px solid var(--stt-red-soft);padding-bottom:4px}
.chk-item{display:flex;align-items:flex-start;gap:8px;padding:9px 6px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.chk-item .no{width:26px;height:26px;border-radius:50%;background:#eef0f3;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex:0 0 auto;margin-top:2px}
.chk-item .desc{flex:1;min-width:160px;font-size:13.5px}
.fixbox{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:8px}
.fixbox input{flex:1;min-width:110px;padding:7px 8px;border:1px solid var(--line);border-radius:6px}
.seg{display:inline-flex;border:1.5px solid var(--line);border-radius:8px;overflow:hidden;align-self:flex-start}
.seg button{border:0;background:#fff;padding:6px 10px;font-size:12px;font-weight:700;color:var(--ink-soft);border-left:1px solid var(--line)}
.seg button:first-child{border-left:0}
.seg button.on-ok{background:var(--ok);color:#fff}.seg button.on-bad{background:var(--bad);color:#fff}.seg button.on-na{background:var(--na);color:#fff}
.comp-card{border:1.5px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px}
.comp-card .hd{font-weight:800;color:var(--stt-red-dark);margin-bottom:10px;font-size:16px}
.slot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-top:6px}
.slot{border:1.5px dashed var(--line);border-radius:10px;overflow:hidden;background:#fafafa;position:relative}
.slot .lab{font-size:11px;font-weight:700;color:var(--ink-soft);padding:5px 6px;background:#f3f4f6;text-align:center}
.slot .ph{aspect-ratio:1;display:flex;align-items:center;justify-content:center;cursor:pointer}
.slot .ph img{width:100%;height:100%;object-fit:cover}.slot .ph .add{color:var(--ink-soft);font-size:24px}
.slot .del{position:absolute;top:24px;right:4px;background:rgba(0,0,0,.6);color:#fff;border:0;border-radius:50%;width:22px;height:22px;font-size:13px;line-height:1}
.up-note{font-size:11px;color:var(--ink-soft);margin-top:6px}
.rep-item{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;cursor:pointer;background:#fff}
.rep-item:hover{border-color:var(--stt-red);background:var(--stt-red-soft)}
.rep-item .docno{font-weight:800;color:var(--stt-red-dark)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:10px;z-index:100;box-shadow:var(--shadow);font-size:14px;opacity:0;transition:opacity .2s;max-width:90%;text-align:center}
.toast.show{opacity:1}
.banner{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:14px}
.banner.demo{background:#fff7ed;border:1px solid #fdba74;color:#9a3412}
.crumb{font-size:13px;color:var(--ink-soft);margin-bottom:10px;cursor:pointer}
.howto-step{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
.howto-step .hd{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#f8fafc;cursor:pointer}
.howto-step .hd .n{width:30px;height:30px;border-radius:8px;background:var(--stt-red);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;flex:0 0 auto}
.howto-step .bd{padding:0 14px;max-height:0;overflow:hidden;transition:max-height .25s,padding .25s}
.howto-step.open .bd{max-height:600px;padding:12px 14px}
.cond-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px}
.cond-grid label{display:flex;align-items:center;gap:6px;font-size:13px;padding:6px;border:1px solid var(--line);border-radius:8px;cursor:pointer}
.cond-grid input{width:auto}
.sign-grid{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-top:24px}
.sign-box{flex:1;min-width:150px;text-align:center}
.sign-line{border-top:1px dotted #555;margin-top:46px;padding-top:6px;font-size:13px}
.lh{display:flex;gap:12px;align-items:flex-start;border-bottom:3px solid var(--stt-red);padding-bottom:8px;margin-bottom:8px}
.lh-mark{flex:0 0 auto;text-align:center;line-height:1}
.lh-mark .lh-mk{font-weight:900;color:var(--stt-red);font-size:20px;letter-spacing:1px;margin-top:-2px}
.lh-mark .lh-mksub{font-size:7px;color:#333;letter-spacing:.5px}
.lh-info{flex:1;min-width:0}
.lh-name{font-weight:900;font-size:18px;color:#111;letter-spacing:.5px;font-style:italic}
.lh-tag{font-weight:700;font-size:13px;color:#222}
.lh-hash{font-size:9.5px;color:#555;word-break:break-word}.lh-addr{font-size:9.5px;color:#444}
.page{background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:18px;margin-bottom:16px;display:flex;flex-direction:column}
.page-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.page-head .t1{font-weight:800;color:var(--stt-red-dark);font-size:15px}
.page-body{flex:1}
.page-foot{display:flex;justify-content:space-between;gap:8px;border-top:1px solid var(--line);margin-top:14px;padding-top:8px;font-size:12px;color:var(--ink-soft)}
.rep-photos{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.rep-photos .c{border:1px solid var(--line);border-radius:8px;overflow:hidden}
.rep-photos .c .lab{font-size:11px;font-weight:700;text-align:center;background:#f3f4f6;padding:4px}
.rep-photos .c img{width:100%;display:block;aspect-ratio:1;object-fit:cover}
.rev-cell{border:1px solid var(--line);border-radius:8px;overflow:hidden}
.rev-cell .lab{font-size:11px;font-weight:700;text-align:center;background:#f3f4f6;padding:4px}
.rev-cell img{width:100%;display:block;aspect-ratio:1;object-fit:cover}
.rev-cell .seg{display:flex;width:100%}
.rev-cell .seg button{flex:1}
@media print{
  .appbar,.no-print,.stepper,.crumb,.toast{display:none!important}
  body{background:#fff}.wrap{max-width:none;padding:0}
  .card{box-shadow:none;border:1px solid #999;page-break-inside:avoid}
  .page{border:none;border-radius:0;box-shadow:none;margin:0;min-height:96vh;page-break-after:always}
  .page:last-child{page-break-after:auto}
}
</style>

async function uploadImage(file,name){
  if(CONFIG.LIVE_PHOTO_ONLY){ const ageMin=(Date.now()-(file.lastModified||0))/60000; if(isFinite(ageMin) && ageMin>CONFIG.LIVE_PHOTO_MAX_AGE_MIN){ throw new Error("LIVE_ONLY"); } }
  const b64=await new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(file);});
  if(DEMO || CONFIG.IMGBB_KEY.startsWith("YOUR_")) return b64;
  const fd=new FormData(); fd.append("image", b64.split(",")[1]);
  if(name){ fd.append("name", String(name).replace(/[^\w฀-๿.\-]+/g,"_").slice(0,120)); }
  const res=await fetch("https://api.imgbb.com/1/upload?key="+CONFIG.IMGBB_KEY,{method:"POST",body:fd});
  const j=await res.json(); if(j&&j.success) return j.data.url; throw new Error("upload failed");
}

function stepChecklist(start,end,phase){
  if(DRAFT.checklist.length!==CHK_FM.length) DRAFT.checklist=CHK_FM.map(blankChk);
  const title = phase==='pre' ? 'ตรวจเช็คก่อนวัดน้ำ (ข้อ 1-8)' : 'ตรวจเช็คหลังวัดน้ำ (ข้อ 9-12)';
  const note  = phase==='pre' ? 'ติ๊กข้อ 1-8 ให้ครบ แล้วกด "ถัดไป" เพื่อไปวัดน้ำ' : 'หลังวัดน้ำ/ติดตั้ง Name Plate เสร็จ ค่อยกลับมาติ๊กข้อ 9-12';
  let rows='';
  for(let i=start;i<end;i++){
    const d=CHK_FM[i], it=DRAFT.checklist[i];
    rows+=`<div class="chk-item"><div class="no">${i+1}</div><div class="desc">${esc(d)}${it.st==='fail'?`<div class="fixbox"><input data-chk="${i}" data-fk="fd" placeholder="${t('fixDetail')}" value="${esc(it.fd)}"><input type="date" data-chk="${i}" data-fk="fdate" value="${esc(it.fdate)}"><input data-chk="${i}" data-fk="fby" placeholder="${t('fixBy')}" value="${esc(it.fby)}"></div>`:''}</div><div class="seg" data-i="${i}"><button data-v="pass" class="${it.st==='pass'?'on-ok':''}">${t('chkPass')}</button><button data-v="na" class="${it.st==='na'?'on-na':''}">${t('chkNA')}</button><button data-v="fail" class="${it.st==='fail'?'on-bad':''}">${t('chkFail')}</button></div></div>`;
  }

}
function stepTable(){

  return `<div class="card"><div class="guide-box">💧 <b>ตารางวัดน้ำ (ทีละช่อง):</b> กรอกค่า + ถ่ายรูปตาม slot</div>${DRAFT.comps.map((c,i)=>compCard(c,i)).join("")}</div>`;

function compCard(c,i){

  return `<div class="comp-card"><div class="hd">ช่องที่ ${i+1} / Comp ${i+1}</div><div class="row">${f("vol1","ปริมาตรระดับ 1 (ล.)","6000")}${f("vol2","ปริมาตรระดับ Max (ล.)","9000")}${f("void_l","Void (≥227 ล.)","")}</div><div class="row">${f("u1","U ระดับ1 (มม.)")}${f("u2","U ระดับMax (มม.)")}${f("bot1","ก้น-แป้น ระดับ1")}${f("bot2","ก้น-แป้น ระดับMax")}${f("h","H (มม.)")}</div><div class="row">${f("seal_plate","เลขซีลแป้น / Plate seal")}${f("seal_cap","เลขซีลฝา / Cap seal")}</div><div class="slot-grid">${COMP_SLOTS.map(s=>slotHtml("comp",i,s.k,s.l,c[s.k])).join("")}</div></div>`;

function stepSlots(target,labels,title,hint){

function slotHtml(target,a,b,label,url){

}
function stepSummary(){
  const fails=DRAFT.checklist.filter(x=>x.st==='fail').length;

}
function bindStep(){
  document.querySelectorAll("#stepbody input,#stepbody select,#stepbody textarea").forEach(el=>{ if(el.type==="file"||el.classList.contains("f_cond")||el.hasAttribute("data-c")||el.hasAttribute("data-chk")) return; el.addEventListener("change",collectStep); });
  document.querySelectorAll("#stepbody input[data-c]").forEach(inp=>{ inp.addEventListener("input",()=>{DRAFT.comps[+inp.dataset.c][inp.dataset.k]=inp.value;}); });
  document.querySelectorAll("#stepbody input[data-chk]").forEach(inp=>{ inp.addEventListener("input",()=>{DRAFT.checklist[+inp.dataset.chk][inp.dataset.fk]=inp.value;}); });
  document.querySelectorAll(".seg[data-i]").forEach(seg=>{ seg.querySelectorAll("button").forEach(btn=>btn.onclick=()=>{ const i=+seg.dataset.i,v=btn.dataset.v; DRAFT.checklist[i].st=v; drawStep(); }); });
  document.querySelectorAll(".slot-input").forEach(inp=>{ inp.onchange=async e=>{ const f=e.target.files[0]; if(!f) return; toast(t('uploading')); const ds=inp.dataset; let label=slotLabel(ds); let url; try{ url=await uploadImage(f,label);}catch(err){ return toast(err.message==="LIVE_ONLY"?t('liveOnly'):"อัปโหลดไม่สำเร็จ"); } storeSlot(ds,url); drawStep(); }; });
  document.querySelectorAll(".del[data-del]").forEach(btn=>{ btn.onclick=()=>{ storeSlot(btn.dataset,""); drawStep(); }; });
}
function slotLabel(ds){
  const tag=(DRAFT.doc_no||DRAFT.sa||"STT");
  if(ds.target==="comp"){ const sl=COMP_SLOTS.find(s=>s.k===ds.key); return "ช่อง"+(+ds.ci+1)+"_"+thaiOnly(sl?sl.l:ds.key)+"_"+tag; }
  if(ds.target==="seal_slots") return "ซีล_"+thaiOnly(SEAL_SLOTS[+ds.idx]||"")+"_"+tag;
  if(ds.target==="chassis_slots") return "chassis_"+thaiOnly(CHASSIS_SLOTS[+ds.idx]||"")+"_"+tag;
  return tag;
}
function storeSlot(ds,url){ if(ds.target==="comp"){ DRAFT.comps[+ds.ci][ds.key]=url; } else { DRAFT[ds.target]=DRAFT[ds.target]||{}; DRAFT[ds.target][ds.idx]=url; } }
function collectStep(){
  const k=curKey();
  if(k==="job"){
    DRAFT.job_type=gv("f_job_type");DRAFT.job_no=gv("f_job_no");DRAFT.sa=gv("f_sa");DRAFT.measure_date=gv("f_measure_date");
    DRAFT.customer=gv("f_customer");DRAFT.address=gv("f_address");DRAFT.plate_head=gv("f_plate_head");DRAFT.plate_tank=gv("f_plate_tank");DRAFT.chassis_head=gv("f_chassis_head");DRAFT.chassis_tank=gv("f_chassis_tank");
    DRAFT.capacity=gv("f_capacity");DRAFT.vehicle_type=gv("f_vehicle_type");DRAFT.product=gv("f_product");DRAFT.model_no=gv("f_model_no");DRAFT.n_comp=Math.max(1,Math.min(12,+gv("f_n_comp")||8));
    if(isJM(DRAFT.job_type)) DRAFT.tank_origin=gv("f_tank_origin");
    DRAFT.conditions=Array.from(document.querySelectorAll(".f_cond:checked")).map(x=>x.value);
  }
  if(k==="summary"){ DRAFT.conclusion=gv("f_conclusion"); DRAFT.remark=gv("f_remark"); }
}
function validateStep(){
  collectStep(); const k=curKey();
  if(k==="job"){ if(!DRAFT.customer.trim()){toast(t('needName'));return false;} if(!DRAFT.sa.trim()){toast(t('needSA'));return false;} }
  if(k==="precheck"||k==="postcheck"){
    const s=k==="precheck"?0:CHK_PRE, e=k==="precheck"?CHK_PRE:CHK_FM.length;
    for(let i=s;i<e;i++){ const x=DRAFT.checklist[i];
      if(!x.st){toast(t('needChk'));return false;}
      if(x.st==='fail'&&(!x.fdate||!x.fby)){toast(t('needFix'));return false;} }
  }
  return true;
}
function stepPrev(){ if(CUR>0){CUR--;drawStepper();drawStep();window.scrollTo(0,0);} }
function stepNext(){ if(!validateStep())return; if(CUR<STEPS.length-1){CUR++;drawStepper();drawStep();window.scrollTo(0,0);} else saveCore(true); }

function buildRec(isFinal){ const r=draftToRecord(); r.id=DRAFT.id||undefined; r.status=isFinal?DRAFT.conclusion:"draft"; r.conditions=(DRAFT.conditions||[]).join(", "); r.created_by=DRAFT.created_by||USER.name; return r; }
async function saveCore(isFinal){
  collectStep();
  if(isFinal && !validateAll()) return;
  // log edit (เมื่อแก้ไขรายงานที่บันทึกแล้ว)
  if(DRAFT._editLog){ DRAFT.history=[...(DRAFT.history||[]),{type:'แก้ไข/ถ่ายรูปใหม่',by:USER.name,date:new Date().toISOString(),detail:'พนักงานแก้ไขข้อมูล/ถ่ายรูปใหม่'}]; if(DRAFT._wasReviewed) DRAFT.review_status="pending"; DRAFT._editLog=false; }
  toast(t('saving'));
  let saved; try{ saved=await DB.saveReport(buildRec(isFinal)); }catch(e){ return toast("บันทึกไม่สำเร็จ — เช็คการเชื่อมต่อ"); }
  DRAFT.id=saved.id; DRAFT.doc_no=saved.doc_no;
  if(DRAFT._wasReviewed){ alertResubmit(saved); DRAFT._wasReviewed=false; }
  if(isFinal){
    const fails=DRAFT.checklist.map((x,i)=>x.st==='fail'?CHK_FM[i]:null).filter(Boolean);
    if(fails.length || saved.status==='needs_fix' || saved.status==='fail') alertSale(saved,fails);
    DRAFT=null; toast("บันทึกสำเร็จ: "+saved.doc_no); go("detail",saved.id);
  } else { toast(t('draftSaved')+": "+saved.doc_no); refreshDocBanner(); }
}
function validateAll(){
  if(!DRAFT.customer.trim()){toast(t('needName'));return false;}
  if(!DRAFT.sa.trim()){toast(t('needSA'));return false;}
  if(DRAFT.checklist.some(x=>!x.st)){toast(t('needChk'));return false;}
  if(DRAFT.checklist.some(x=>x.st==='fail'&&(!x.fdate||!x.fby))){toast(t('needFix'));return false;}
  return true;
}

function resumeDraft(r){
  const d=r.data||{};
  DRAFT={id:r.id,doc_no:r.doc_no,created_by:r.created_by||USER.name,job_type:r.job_type||"JM",sa:r.sa||"",job_no:r.job_no||"",measure_date:r.measure_date||new Date().toISOString().slice(0,10),customer:r.customer||"",address:r.address||"",plate_head:r.plate_head||"",plate_tank:r.plate_tank||"",chassis_head:r.chassis_head||"",chassis_tank:r.chassis_tank||"",capacity:r.capacity||"",vehicle_type:r.vehicle_type||VEHICLE_TYPES[0],product:r.product||PRODUCT_TYPES[0],model_no:r.model_no||"",tank_origin:r.tank_origin||TANK_ORIGINS[0],conditions:d.conditions||[],location:r.location||"บริษัท สุธี แท็งเกอร์",n_comp:d.n_comp||(d.comps?d.comps.length:8),comps:(d.comps&&d.comps.length)?d.comps:Array.from({length:8},blankComp),checklist:(d.checklist&&d.checklist.length===CHK_FM.length)?d.checklist:CHK_FM.map(blankChk),seal_slots:d.seal_slots||{},chassis_slots:d.chassis_slots||{},conclusion:d.conclusion||"pass",remark:d.remark||"",history:d.history||[],review_photos:d.review_photos||{},reviewer:d.reviewer||"",review_status:d.review_status||"",review_date:d.review_date||"",_editLog:(r.status!=='draft'),_wasReviewed:!!(d.reviewer)};
  CUR=0; go('new');
}
async function editReport(id){ let r; try{r=await DB.getReport(id);}catch(e){return toast("โหลดไม่ได้");} if(!r) return toast("ไม่พบรายงาน"); resumeDraft(r); }
/* ===== Review (หัวหน้า) ===== */
let REVIEW={id:null,r:null,photos:[],map:{}};
async function ReviewView(id){
  if(!canReview()){ $("#page").innerHTML=`<div class="crumb" onclick="go('detail','${esc(String(id))}')">← กลับ</div><div class="card">${t('reviewOnlyLead')}</div>`; return; }
  let r; try{r=await DB.getReport(id);}catch(e){$("#page").innerHTML='<p>โหลดไม่ได้</p>';return;}
  if(!r){$("#page").innerHTML='<p>ไม่พบรายงาน</p>';return;}
  REVIEW={id:id,r:r,photos:allPhotos(r.data||{}),map:Object.assign({},(r.data&&r.data.review_photos)||{})};
  drawReview();
}
function drawReview(){
  const photos=REVIEW.photos;
  if(!photos.length){ $("#page").innerHTML=`<div class="crumb" onclick="go('detail','${esc(String(REVIEW.id))}')">← กลับ</div><div class="card">ยังไม่มีรูปให้ตรวจ — ให้พนักงานถ่ายรูปก่อน</div>`; return; }
  const secs=[]; photos.forEach(p=>{ if(secs.indexOf(p.sec)<0) secs.push(p.sec); });
  $("#page").innerHTML=`
    <div class="crumb no-print" onclick="go('detail','${esc(String(REVIEW.id))}')">← กลับ</div>
    <h1>🔎 ${t('reviewTitle')}</h1>
    <div class="guide-box">${t('reviewerLabel')}: <b>${esc(USER.name)}</b> • เอกสาร ${esc(REVIEW.r.doc_no)} — ติ๊ก OK/ไม่OK ทุกรูป หรือกด "Accept ทั้งหมด" • ถ้ามีรูปไม่ผ่าน ระบบจะแจ้งกลุ่ม Line QC ให้ถ่ายใหม่ทันที</div>
    <div style="margin-bottom:10px"><button class="btn sm" onclick="reviewAcceptAll()">${t('acceptAll')}</button></div>
    ${secs.map(sec=>`<div class="card"><div class="row" style="align-items:center"><h2 style="flex:1;margin:0">${esc(sec)}</h2><button class="btn sm sec" onclick="reviewAcceptSec(${JSON.stringify(sec)})">${t('acceptSec')}</button></div><div class="rep-photos" style="margin-top:10px">${photos.filter(p=>p.sec===sec).map(p=>`<div class="rev-cell"><div class="lab">${esc(p.label)}</div><img src="${esc(p.url)}"><div class="seg" data-rk="${esc(p.key)}"><button data-v="ok" class="${REVIEW.map[p.key]==='ok'?'on-ok':''}">OK</button><button data-v="no" class="${REVIEW.map[p.key]==='no'?'on-bad':''}">ไม่ OK</button></div></div>`).join("")}</div></div>`).join("")}
    <button class="btn block" onclick="saveReview()">${t('reviewSave')}</button>`;
  document.querySelectorAll(".seg[data-rk]").forEach(seg=>seg.querySelectorAll("button").forEach(b=>b.onclick=()=>{ REVIEW.map[seg.dataset.rk]=b.dataset.v; drawReview(); }));
}
function reviewAcceptAll(){ REVIEW.photos.forEach(p=>REVIEW.map[p.key]='ok'); drawReview(); }
function reviewAcceptSec(sec){ REVIEW.photos.filter(p=>p.sec===sec).forEach(p=>REVIEW.map[p.key]='ok'); drawReview(); }
async function saveReview(){
  const photos=REVIEW.photos;
  if(photos.some(p=>!REVIEW.map[p.key])) return toast(t('needAllPhotos'));
  const bad=photos.filter(p=>REVIEW.map[p.key]==='no');
  const status=bad.length?'rephoto':'accepted';
  const r=REVIEW.r; const d=Object.assign({},r.data||{}); const now=new Date().toISOString();
  d.review_photos=REVIEW.map; d.reviewer=USER.name; d.review_date=now; d.review_status=status;
  d.history=[...(d.history||[]),{type:'ตรวจสอบรูป',by:USER.name,date:now,detail:status==='accepted'?'ผ่านทุกรูป':('ให้ถ่ายใหม่: '+bad.map(p=>p.label).join(', '))}];
  const rec={id:r.id,job_type:r.job_type,job_no:r.job_no,sa:r.sa,measure_date:r.measure_date,customer:r.customer,address:r.address,plate_head:r.plate_head,plate_tank:r.plate_tank,chassis_head:r.chassis_head,chassis_tank:r.chassis_tank,capacity:r.capacity,vehicle_type:r.vehicle_type,product:r.product,model_no:r.model_no,tank_origin:r.tank_origin,conditions:(d.conditions||[]).join(", "),location:r.location,status:r.status,created_by:r.created_by,reviewer:USER.name,review_status:status,data:d};
  toast(t('saving'));
  try{ await DB.saveReport(rec); }catch(e){ return toast("บันทึกไม่สำเร็จ"); }
  if(status==='rephoto') alertQC(r,bad.map(p=>p.label));
  toast(status==='accepted'?'ตรวจผ่านทั้งหมด ✓':'แจ้งให้ถ่ายรูปใหม่แล้ว');
  go('detail',r.id);
}
function buildReportPages(r){
  const d=r.data||{};
  const comp=(d.comps||[]);
  const maker=esc(r.created_by||"-");
  const cdate=r.created_at? new Date(r.created_at).toLocaleDateString('th-TH') : (r.measure_date||"-");
  const triple=v=>v==='pass'?'<span class="pill ok">ผ่าน</span>':v==='fail'?'<span class="pill bad">ไม่ผ่าน</span>':v==='na'?'<span class="pill na">–</span>':'<span class="pill draft">-</span>';
  const pages=[];
  pages.push(`<h2>ข้อมูลทั่วไป</h2><div class="row"><div style="flex:1;min-width:200px"><div><b>ลูกค้า:</b> ${esc(r.customer)}</div><div><b>ที่อยู่:</b> ${esc(r.address||'-')}</div><div><b>Job:</b> ${esc(thaiOnly(r.job_type))} ${esc(r.job_no||'')} • <b>S/N:</b> ${esc(r.sa||'-')}</div><div><b>วันที่วัดน้ำ:</b> ${esc(r.measure_date||'-')}</div>${r.tank_origin?`<div><b>ประเภทแท็งค์:</b> ${esc(thaiOnly(r.tank_origin))}</div>`:''}</div><div style="flex:1;min-width:200px"><div><b>ทะเบียนหัว/แท็งก์:</b> ${esc(r.plate_head||'-')} / ${esc(r.plate_tank||'-')}</div><div><b>คัสซีหัว/หาง:</b> ${esc(r.chassis_head||'-')} / ${esc(r.chassis_tank||'-')}</div><div><b>ความจุ:</b> ${esc(r.capacity||'-')} ลิตร • ${esc(thaiOnly(r.product))}</div><div><b>ประเภทรถ:</b> ${esc(thaiOnly(r.vehicle_type))} • รุ่น ${esc(r.model_no||'-')}</div></div></div>${(d.conditions&&d.conditions.length)?`<div style="margin-top:10px"><b>เงื่อนไขการวัดน้ำ:</b> ${esc(d.conditions.map(thaiOnly).join(", "))}</div>`:''}<div class="guide-box" style="margin-top:12px">${esc(WATER_TERM)}</div>`);
  pages.push(`<h2>ข้อมูลการวัดน้ำ (${comp.length} ช่อง)</h2><div class="tbl-scroll"><table class="data"><tr><th class="rowlabel">ช่องที่</th>${comp.map((_,i)=>`<th>${i+1}</th>`).join("")}</tr><tr><td class="rowlabel">ปริมาตร ระดับ1</td>${comp.map(c=>`<td>${esc(c.vol1)}</td>`).join("")}</tr><tr><td class="rowlabel">ปริมาตร ระดับMax</td>${comp.map(c=>`<td>${esc(c.vol2)}</td>`).join("")}</tr><tr><td class="rowlabel">U ระดับ1</td>${comp.map(c=>`<td>${esc(c.u1)}</td>`).join("")}</tr><tr><td class="rowlabel">U ระดับMax</td>${comp.map(c=>`<td>${esc(c.u2)}</td>`).join("")}</tr><tr><td class="rowlabel">ก้น-แป้น ระดับ1</td>${comp.map(c=>`<td>${esc(c.bot1)}</td>`).join("")}</tr><tr><td class="rowlabel">ก้น-แป้น ระดับMax</td>${comp.map(c=>`<td>${esc(c.bot2)}</td>`).join("")}</tr><tr><td class="rowlabel">H</td>${comp.map(c=>`<td>${esc(c.h)}</td>`).join("")}</tr><tr><td class="rowlabel">Void</td>${comp.map(c=>`<td>${esc(c.void_l)}</td>`).join("")}</tr><tr><td class="rowlabel">ซีลแป้น</td>${comp.map(c=>`<td>${esc(c.seal_plate)}</td>`).join("")}</tr><tr><td class="rowlabel">ซีลฝา</td>${comp.map(c=>`<td>${esc(c.seal_cap)}</td>`).join("")}</tr></table></div>`);
  comp.forEach((c,i)=>{ const ph=COMP_SLOTS.map(s=>c[s.k]?`<div class="c"><div class="lab">${esc(thaiOnly(s.l))}</div><img src="${esc(c[s.k])}"></div>`:'').join(""); if(ph) pages.push(`<h2>รูปช่องที่ ${i+1}</h2><div class="rep-photos">${ph}</div>`); });
  const sealPh=SEAL_SLOTS.map((lab,idx)=>(d.seal_slots&&d.seal_slots[idx])?`<div class="c"><div class="lab">${esc(thaiOnly(lab))}</div><img src="${esc(d.seal_slots[idx])}"></div>`:'').join("");
  if(sealPh) pages.push(`<h2>จุดร้อยซีล + เช็คลมยาง</h2><div class="rep-photos">${sealPh}</div>`);
  const chPh=CHASSIS_SLOTS.map((lab,idx)=>(d.chassis_slots&&d.chassis_slots[idx])?`<div class="c"><div class="lab">${esc(thaiOnly(lab))}</div><img src="${esc(d.chassis_slots[idx])}"></div>`:'').join("");
  if(chPh) pages.push(`<h2>Chassis / Name Plate</h2><div class="rep-photos">${chPh}</div>`);
  const cl=d.checklist||[];
  let chkHtml='<h2>ผลการตรวจสอบ (FM-SAL-0102)</h2>';
  cl.forEach((it,i)=>{ if(i===0) chkHtml+=`<div class="grp">ก่อนวัดน้ำ (ข้อ 1-8)</div>`; if(i===CHK_PRE) chkHtml+=`<div class="grp">หลังวัดน้ำ (ข้อ 9-12)</div>`; const st=(it&&it.st)?it.st:''; const fix=(st==='fail')?`<div class="muted">แก้ไข: ${esc(it.fd||'-')} • วันที่ ${esc(it.fdate||'-')} • โดย ${esc(it.fby||'-')}</div>`:''; chkHtml+=`<div class="chk-item"><div class="no">${i+1}</div><div class="desc">${esc(thaiOnly(CHK_FM[i]||''))}${fix}</div>${triple(st)}</div>`; });
  if(d.remark) chkHtml+=`<div class="guide-box" style="margin-top:12px"><b>หมายเหตุ:</b> ${esc(d.remark)}</div>`;
  // การตรวจสอบโดยหัวหน้า + ประวัติ
  if(d.reviewer || (d.history&&d.history.length)){
    chkHtml+=`<h2 style="margin-top:14px">การตรวจสอบรูปภาพ (หัวหน้า)</h2>`;
    if(d.reviewer) chkHtml+=`<div><b>${'หัวหน้าผู้ตรวจสอบ'}:</b> ${esc(d.reviewer)} • วันที่ ${esc(d.review_date? new Date(d.review_date).toLocaleString('th-TH'):'-')} • ผล: ${reviewPill(d.review_status)}</div>`;
    if(d.history&&d.history.length){ chkHtml+=`<div style="margin-top:6px"><b>ประวัติการตรวจ/แก้ไข (${d.history.length} ครั้ง):</b>`+d.history.map((x,i)=>`<div class="muted">${i+1}. [${esc(x.type)}] โดย ${esc(x.by)} — ${esc(x.date? new Date(x.date).toLocaleString('th-TH'):'')}${x.detail?(' — '+esc(x.detail)):''}</div>`).join("")+`</div>`; }
  }
  chkHtml+=`<div class="sign-grid"><div class="sign-box"><div class="sign-line">ผู้ตรวจสอบ (QC Inspector)</div><div style="margin-top:4px">${maker}</div><div class="muted">วันที่ ${cdate}</div></div><div class="sign-box"><div class="sign-line">หัวหน้าผู้ตรวจรูป (QC Lead)</div><div style="margin-top:4px">${esc(d.reviewer||'')}</div></div><div class="sign-box"><div class="sign-line">ผู้รับรอง (Approved by)</div></div><div class="sign-box"><div class="sign-line">Factory Manager</div></div></div>`;
  pages.push(chkHtml);
  const total=pages.length;
  const head=`${LETTERHEAD}<div class="page-head"><div class="t1">REPORT การวัดน้ำ / Water Gauging Report</div><div style="text-align:right"><div class="docno" style="font-size:17px;color:var(--stt-red-dark);font-weight:800">${esc(r.doc_no)}</div>${statusPill(r.status)}</div></div>`;
  const foot=n=>`<div class="page-foot"><div>ผู้จัดทำ: <b>${maker}</b></div><div>วันที่จัดทำ: ${cdate}</div><div>หน้า ${n} / ${total}</div></div>`;
  return pages.map((c,i)=>`<div class="page">${head}<div class="page-body">${c}</div>${foot(i+1)}</div>`).join("");
}
async function DetailView(id){
  let r; try{r=await DB.getReport(id);}catch(e){$("#page").innerHTML='<p>โหลดไม่ได้</p>';return;}
  if(!r){$("#page").innerHTML='<p>ไม่พบรายงาน</p>';return;}
  const logs=await DB.printLogs(id).catch(()=>[]);
  const d=r.data||{};
  const pagesHtml=buildReportPages(r);
  const hasPhotos=allPhotos(d).length>0;
  $("#page").innerHTML=`
    <div class="crumb no-print" onclick="go('search')">${t('back')}</div>
    ${r.status==='draft'?`<div class="banner demo no-print">ฉบับร่าง — <a href="javascript:void(0)" onclick="editReport('${esc(String(r.id))}')">กดเพื่อทำต่อ/แก้ไข</a></div>`:''}
    ${(d.review_status)?`<div class="banner no-print" style="background:#f0f9ff;border:1px solid #bae6fd;color:#075985">สถานะตรวจรูป: ${reviewPill(d.review_status)} ${d.reviewer?('• โดย '+esc(d.reviewer)):''}</div>`:''}
    <div id="printable">${pagesHtml}</div>
    <div class="card no-print">
      <div class="row" style="align-items:center">
        <button class="btn" onclick="doPrint('${esc(String(r.id))}')">${t('printBtn')}</button>
        ${canReview()&&hasPhotos?`<button class="btn sec" onclick="go('review','${esc(String(r.id))}')">${t('reviewBtn')}</button>`:''}
        <button class="btn grey" onclick="editReport('${esc(String(r.id))}')">${t('editBtn')}</button>
        ${(r.status==='needs_fix'||r.status==='fail')?`<button class="btn sec" onclick='reAlert(${JSON.stringify(r).replace(/'/g,"&#39;")})'>📣 แจ้งกลุ่ม Sale</button>`:''}
        <div style="flex:1"></div>
        <div class="muted">ปริ้นไปแล้ว <b>${r.print_count||0}</b> ครั้ง${r.last_printed_by?` • ล่าสุดโดย ${esc(r.last_printed_by)}`:''}</div>
      </div>
      <p class="up-note">Admin/หัวหน้า กด "พิมพ์/บันทึก PDF" แล้วเลือก "บันทึกเป็น PDF" จะได้ไฟล์พร้อมหัวกระดาษและช่องเซ็น</p>
      ${logs.length?`<div style="margin-top:6px"><b>ประวัติการพิมพ์</b>${logs.map(l=>`<div class="muted">• ${esc(l.printed_by)} — ${new Date(l.printed_at).toLocaleString('th-TH')}</div>`).join("")}</div>`:''}
    </div>`;
}
async function doPrint(id){ await DB.logPrint(id,USER.name).catch(()=>{}); toast("บันทึกการพิมพ์โดย "+USER.name); setTimeout(()=>window.print(),350); }
function reAlert(r){ alertSale(r,[]); }
render("home");
</script>
